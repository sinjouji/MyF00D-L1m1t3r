<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食材管理 🥦</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ====================================
     ヘッダー & ナビ
     ==================================== -->
<header>
  <div class="header-inner">
    <a class="logo" href="index.html">🥦 食材管理</a>
    <nav>
      <a href="index.html" class="active">ホーム</a>
      <a href="db.html">食材DB</a>
      <a href="history.html">履歴</a>
    </nav>
  </div>
</header>

<!-- ====================================
     メイン：期限ステータス別表示
     ==================================== -->
<main id="mainContent">
  <div class="loading-wrap">
    <div class="spinner"></div>読み込み中…
  </div>
</main>

<!-- ====================================
     FAB（新規食材追加ボタン）
     ==================================== -->
<button class="fab" id="fabBtn" title="新規食材を追加">＋</button>

<!-- ====================================
     ボトムバー：期限登録トグルパネル
     ==================================== -->
<div class="bottom-bar">
  <div class="bottom-bar-inner">

    <!-- 入力パネル（折りたたみ） -->
    <div class="input-panel" id="inputPanel">

      <!-- 検索バー -->
      <div class="search-wrap">
        <input
          type="text"
          class="search-input"
          id="homeSearch"
          placeholder="🔍 食材名を検索して期限を更新…"
          autocomplete="off"
        >
        <!-- サジェストリスト（パネルの上に表示） -->
        <div class="suggest-list" id="homeSuggestList"></div>
      </div>

      <!-- 選択中の食材を表示 -->
      <div id="selectedFoodInfo" style="display:none; margin-bottom:10px;">
        <span style="font-size:0.82rem; color:var(--text-3);">選択中：</span>
        <strong id="selectedFoodName" style="color:var(--primary-d); font-size:0.92rem;"></strong>
      </div>

      <!-- 日数テンプレートボタン -->
      <div class="date-templates">
        <button class="date-btn" data-days="0">今日</button>
        <button class="date-btn" data-days="1">明日</button>
        <button class="date-btn" data-days="3">３日後</button>
        <button class="date-btn" data-days="7">７日後</button>
        <button class="date-btn" data-days="manual">手動入力</button>
      </div>

      <!-- 手動入力欄（「手動入力」ボタンを押したとき表示） -->
      <div class="manual-wrap" id="homeManualWrap">
        <input type="date" id="homeManualDate">
      </div>

      <!-- メモ入力（任意・1行） -->
      <input
        type="text"
        class="memo-input"
        id="homeMemo"
        placeholder="メモ（任意）例: 明治おいしい牛乳"
        maxlength="100"
      >

      <!-- 登録ボタン -->
      <button class="register-btn" id="homeRegisterBtn">期限を登録する</button>
    </div>

    <!-- トグルボタン -->
    <button class="toggle-btn" id="toggleBtn">
      <span>📝 期限を登録する</span>
      <span class="toggle-arrow">▲</span>
    </button>

  </div>
</div>

<!-- ====================================
     新規食材追加モーダル
     ==================================== -->
<div class="modal-overlay" id="newFoodOverlay">
  <div class="modal" id="newFoodModal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span>🌿 新規食材を追加</span>
      <button class="modal-close" id="newFoodClose">✕</button>
    </div>

    <!-- 食材名 ＋ お気に入りボタン -->
    <div class="food-name-row">
      <input
        type="text"
        class="food-name-input"
        id="newFoodName"
        placeholder="食材名を入力…"
        autocomplete="off"
      >
      <button class="fav-toggle-btn" id="newFoodFavBtn" title="お気に入り登録">☆</button>
    </div>

    <!-- モーダル内サジェスト（既存食材の候補） -->
    <div class="modal-suggest-list suggest-list" id="newFoodSuggestList"></div>

    <!-- 日数テンプレート -->
    <div class="date-templates" style="margin-top:4px;">
      <button class="date-btn" data-days="0" id="nf-d0">今日</button>
      <button class="date-btn" data-days="1" id="nf-d1">明日</button>
      <button class="date-btn" data-days="3" id="nf-d3">３日後</button>
      <button class="date-btn" data-days="7" id="nf-d7">７日後</button>
      <button class="date-btn" data-days="manual" id="nf-dm">手動入力</button>
    </div>

    <!-- 手動日付 -->
    <div class="manual-wrap" id="newFoodManualWrap">
      <input type="date" id="newFoodManualDate">
    </div>

    <!-- メモ -->
    <input
      type="text"
      class="memo-input"
      id="newFoodMemo"
      placeholder="メモ（任意）"
      maxlength="100"
      style="margin-top:6px;"
    >

    <!-- 登録ボタン -->
    <button class="register-btn" id="newFoodRegisterBtn">追加する</button>
  </div>
</div>

<!-- ====================================
     確認モーダル
     ==================================== -->
<div class="modal-overlay center" id="confirmOverlay">
  <div class="modal confirm-modal" id="confirmModal">
    <p class="confirm-head" id="confirmTitle">登録しますか？</p>
    <p class="confirm-sub"  id="confirmSub"></p>
    <div class="confirm-detail" id="confirmDetail"></div>
    <div class="confirm-btns">
      <button class="btn-cancel"  id="confirmCancel">キャンセル</button>
      <button class="btn-confirm" id="confirmOk">登録する</button>
    </div>
  </div>
</div>

<!-- トースト通知 -->
<div class="toast" id="toast"></div>


<!-- ====================================
     Firebase & スクリプト
     ==================================== -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>

<script>
/* ============================================================
   index.js  —  ホームページのロジック
   ============================================================ */

// ===== 状態管理 =====
let inventoryItems = [];    // 在庫リスト（Firestoreリアルタイム）
let allFoods       = [];    // 食材マスタ（随時取得）

// ホームパネル用
let homeSelectedFood = null;   // 選択された在庫アイテム
let homeExpiryDate   = null;   // 選択された期限日

// 新規食材モーダル用
let newFoodIsFav     = false;
let newFoodExpiry    = null;
let newFoodExistingId = null;  // 既存食材を選択した場合のfoodId

// 確認モーダルのコールバック
let confirmCallback = null;


/* ====================================
   在庫をリアルタイム監視 → 画面を更新
   ==================================== */

// まず空の状態でレンダリングしてローディングを解除
renderHome();

// Firestoreからリアルタイム更新（設定済みなら上書き）
onInventorySnapshot(
  items => {
    inventoryItems = items;
    renderHome();
  },
  err => {
    // Firebase未設定・接続エラー時はそのまま空表示を維持
    console.warn('Firebase未接続のため在庫データを取得できません:', err.message);
    showFirebaseWarning();
  }
);


/* ====================================
   ホーム画面レンダリング
   ==================================== */
function renderHome() {
  const today  = getToday();
  const main   = document.getElementById('mainContent');

  // 期限切れ・今日・3日以内 に分類
  const expired = inventoryItems.filter(i => getDaysUntil(i.expiryDate) < 0);

const todayArr = inventoryItems.filter(i =>
  getDaysUntil(i.expiryDate) === 0
);

const soonArr = inventoryItems.filter(i => {
  const d = getDaysUntil(i.expiryDate);
  return d > 0 && d <= 3;
});

const laterArr = inventoryItems.filter(i =>
  getDaysUntil(i.expiryDate) > 3
);

  main.innerHTML = `
    ${renderSection('expired', '🚨 期限切れ',   expired,  '期限切れの食材はありません ✨')}
    ${renderSection('today',   '⏰ 今日まで',    todayArr, '今日期限の食材はありません')}
    ${renderSection('soon',    '📅 ３日以内',    soonArr,  '3日以内に期限が来る食材はありません')}
    ${renderSection('ok', '🧊 その他', laterArr, '登録された食材はありません')}
  `;

  // カードクリックで検索バーに食材名をセット
  document.querySelectorAll('.food-card[data-invid]').forEach(card => {
    card.addEventListener('click', () => {
      const invId = card.dataset.invid;
      const item  = inventoryItems.find(i => i.id === invId);
      if (!item) return;
      selectHomeFood(item);
      openTogglePanel();
    });
  });
}

function renderSection(status, label, items, emptyMsg) {
  const count = items.length;
  return `
    <section class="expiry-section">
      <div class="section-head">
        <span class="badge ${status}">${label}</span>
        <span class="section-count">${count}件</span>
      </div>
      <div class="food-grid">
        ${count === 0
          ? `<div class="empty-card">${emptyMsg}</div>`
          : items.map(item => renderFoodCard(item, status)).join('')
        }
      </div>
    </section>
  `;
}

function renderFoodCard(item, status) {
  const days  = getDaysUntil(item.expiryDate);
  const label = daysLabel(days);
  return `
    <div class="food-card ${status}" data-invid="${item.id}">
      <span class="food-card-fav">${item.favorite ? '⭐' : ''}</span>
      <div class="food-card-body">
        <div class="food-card-name">${escapeHtml(item.foodName)}</div>
        ${item.memo ? `<div class="food-card-memo">${escapeHtml(item.memo)}</div>` : ''}
      </div>
      <div class="food-card-right">
        <div class="food-card-date">${formatDate(item.expiryDate)}</div>
        <span class="days-chip ${status}">${label}</span>
      </div>
    </div>
  `;
}


/* ====================================
   トグルパネル開閉
   ==================================== */
const toggleBtn  = document.getElementById('toggleBtn');
const inputPanel = document.getElementById('inputPanel');
const fab        = document.getElementById('fabBtn');

function openTogglePanel() {
  inputPanel.classList.add('open');
  toggleBtn.classList.add('open');
  fab.classList.add('hidden');
  document.getElementById('homeSearch').focus();
}

function closeTogglePanel() {
  inputPanel.classList.remove('open');
  toggleBtn.classList.remove('open');
  fab.classList.remove('hidden');
}

toggleBtn.addEventListener('click', () => {
  if (inputPanel.classList.contains('open')) {
    closeTogglePanel();
  } else {
    openTogglePanel();
  }
});


/* ====================================
   ホーム：検索サジェスト
   ==================================== */
const homeSearchEl     = document.getElementById('homeSearch');
const homeSuggestList  = document.getElementById('homeSuggestList');
const selectedFoodInfo = document.getElementById('selectedFoodInfo');
const selectedFoodName = document.getElementById('selectedFoodName');

// 食材が選択されたときの処理
function selectHomeFood(item) {
  homeSelectedFood = item;
  homeSearchEl.value = item.foodName;
  selectedFoodName.textContent = item.foodName;
  selectedFoodInfo.style.display = 'block';
  homeSuggestList.classList.remove('show');
}

// ※ サジェストはホームパネル用に手動実装（在庫リストが動的なため）

// 在庫アイテム用に上書き（inventoryItemsが動的に変わるため）
let homeDebounce;
homeSearchEl.addEventListener('input', () => {
  clearTimeout(homeDebounce);
  homeDebounce = setTimeout(() => {
    homeSelectedFood = null;
    selectedFoodInfo.style.display = 'none';

    const q = homeSearchEl.value.trim().toLowerCase();
    homeSuggestList.innerHTML = '';
    if (!q) { homeSuggestList.classList.remove('show'); return; }

    const exact   = inventoryItems.filter(i => i.foodName.toLowerCase() === q);
    const prefix  = inventoryItems.filter(i => i.foodName.toLowerCase().startsWith(q) && i.foodName.toLowerCase() !== q);
    const partial = inventoryItems.filter(i =>
      i.foodName.toLowerCase().includes(q) && !i.foodName.toLowerCase().startsWith(q)
    );
    const candidates = [...exact, ...prefix, ...partial].slice(0, 8);

    if (!candidates.length) { homeSuggestList.classList.remove('show'); return; }

    candidates.forEach(item => {
      const div = document.createElement('div');
      div.className = 'suggest-item';
      div.innerHTML = `
        <span class="suggest-fav">${item.favorite ? '⭐' : ''}</span>
        <span class="suggest-name">${escapeHtml(item.foodName)}</span>
        <span class="suggest-badge">${formatDate(item.expiryDate)}</span>
      `;
      div.addEventListener('mousedown', e => {
        e.preventDefault();
        selectHomeFood(item);
      });
      homeSuggestList.appendChild(div);
    });

    homeSuggestList.classList.add('show');
  }, 150);
});

homeSearchEl.addEventListener('blur', () => {
  setTimeout(() => homeSuggestList.classList.remove('show'), 200);
});


/* ====================================
   ホーム：日数テンプレートボタン
   ==================================== */
const homeManualWrap = document.getElementById('homeManualWrap');
const homeManualDate = document.getElementById('homeManualDate');

// ホームパネルのdateボタン全て
document.querySelectorAll('.input-panel .date-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    // アクティブ状態をリセット
    document.querySelectorAll('.input-panel .date-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const days = btn.dataset.days;
    if (days === 'manual') {
      homeManualWrap.classList.add('show');
      homeExpiryDate = homeManualDate.value || null;
    } else {
      homeManualWrap.classList.remove('show');
      homeExpiryDate = getDateStr(Number(days));
    }
  });
});

homeManualDate.addEventListener('change', () => {
  homeExpiryDate = homeManualDate.value || null;
});


/* ====================================
   ホーム：期限登録
   ==================================== */
document.getElementById('homeRegisterBtn').addEventListener('click', () => {
  // バリデーション
  if (!homeSelectedFood) {
    showToast('⚠️ 食材を検索・選択してください');
    homeSearchEl.focus();
    return;
  }
  if (!homeExpiryDate) {
    showToast('⚠️ 期限日を選択してください');
    return;
  }

  const memo = document.getElementById('homeMemo').value.trim();

  // 確認モーダルを表示
  showConfirm({
    title:    '期限を登録しますか？',
    sub:      '',
    detail:   `
      <p><span class="dl">食材</span>${escapeHtml(homeSelectedFood.foodName)}</p>
      <p><span class="dl">期限</span>${formatDate(homeExpiryDate)}</p>
      ${memo ? `<p><span class="dl">メモ</span>${escapeHtml(memo)}</p>` : ''}
    `,
    okLabel:  '登録する',
    callback: async () => {
      try {
        await registerInventory(
          homeSelectedFood.foodId,
          homeSelectedFood.foodName,
          homeExpiryDate,
          memo,
          homeSelectedFood.favorite
        );
        showToast(`✅ ${homeSelectedFood.foodName} の期限を登録しました`);
        resetHomePanel();
        closeTogglePanel();
      } catch (e) {
        console.error(e);
        showToast('❌ 登録に失敗しました');
      }
    }
  });
});

function resetHomePanel() {
  homeSearchEl.value = '';
  homeSelectedFood   = null;
  homeExpiryDate     = null;
  selectedFoodInfo.style.display = 'none';
  document.getElementById('homeMemo').value = '';
  homeManualDate.value = '';
  homeManualWrap.classList.remove('show');
  document.querySelectorAll('.input-panel .date-btn').forEach(b => b.classList.remove('active'));
}


/* ====================================
   新規食材追加モーダル
   ==================================== */
const newFoodOverlay    = document.getElementById('newFoodOverlay');
const newFoodClose      = document.getElementById('newFoodClose');
const newFoodFavBtn     = document.getElementById('newFoodFavBtn');
const newFoodNameEl     = document.getElementById('newFoodName');
const newFoodSuggestEl  = document.getElementById('newFoodSuggestList');
const newFoodManualWrap = document.getElementById('newFoodManualWrap');
const newFoodManualDate = document.getElementById('newFoodManualDate');

// FABクリックでモーダルを開く
// ★ まずモーダルを即座に開き、食材マスタはバックグラウンドで取得
fab.addEventListener('click', () => {
  openNewFoodModal();
  // 食材マスタをバックグラウンドで取得（サジェスト用）
  getAllFoods()
    .then(foods => { allFoods = foods; })
    .catch(err  => { console.warn('食材マスタ取得失敗（サジェスト無効）:', err.message); });
});

function openNewFoodModal() {
  resetNewFoodModal();
  newFoodOverlay.classList.add('show');
  setTimeout(() => newFoodNameEl.focus(), 320);
}

function closeNewFoodModal() {
  newFoodOverlay.classList.remove('show');
  newFoodOverlay.style.display = 'none';

  resetNewFoodModal();

  setTimeout(() => {
    newFoodOverlay.style.display = '';
  }, 10);
}

newFoodClose.addEventListener('click', closeNewFoodModal);
newFoodOverlay.addEventListener('click', e => {
  if (e.target === newFoodOverlay) closeNewFoodModal();
});

// お気に入りトグル
newFoodFavBtn.addEventListener('click', () => {
  newFoodIsFav = !newFoodIsFav;
  newFoodFavBtn.textContent = newFoodIsFav ? '⭐' : '☆';
  newFoodFavBtn.classList.toggle('active', newFoodIsFav);
});

// 新規食材モーダルのサジェスト（食材マスタから）
let nfDebounce;
newFoodNameEl.addEventListener('input', () => {
  clearTimeout(nfDebounce);
  newFoodExistingId = null;

  nfDebounce = setTimeout(async () => {
    const q = newFoodNameEl.value.trim().toLowerCase();
    newFoodSuggestEl.innerHTML = '';

    if (!q) { newFoodSuggestEl.classList.remove('show'); return; }

    const candidates = (await searchFoodsByName(q, allFoods)).slice(0, 8);

    if (!candidates.length) { newFoodSuggestEl.classList.remove('show'); return; }

    candidates.forEach(food => {
      const div = document.createElement('div');
      div.className = 'suggest-item';
      div.innerHTML = `
        <span class="suggest-fav">${food.favorite ? '⭐' : ''}</span>
        <span class="suggest-name">${escapeHtml(food.name)}</span>
        <span class="suggest-badge">既存</span>
      `;
      div.addEventListener('mousedown', e => {
        e.preventDefault();
        newFoodNameEl.value  = food.name;
        newFoodIsFav         = food.favorite;
        newFoodExistingId    = food.id;
        newFoodFavBtn.textContent = newFoodIsFav ? '⭐' : '☆';
        newFoodFavBtn.classList.toggle('active', newFoodIsFav);
        newFoodSuggestEl.classList.remove('show');
      });
      newFoodSuggestEl.appendChild(div);
    });

    newFoodSuggestEl.classList.add('show');
  }, 150);
});

newFoodNameEl.addEventListener('blur', () => {
  setTimeout(() => newFoodSuggestEl.classList.remove('show'), 200);
});

// 新規食材モーダルの日数テンプレート
document.querySelectorAll('#newFoodModal .date-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#newFoodModal .date-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const days = btn.dataset.days;
    if (days === 'manual') {
      newFoodManualWrap.classList.add('show');
      newFoodExpiry = newFoodManualDate.value || null;
    } else {
      newFoodManualWrap.classList.remove('show');
      newFoodExpiry = getDateStr(Number(days));
    }
  });
});

newFoodManualDate.addEventListener('change', () => {
  newFoodExpiry = newFoodManualDate.value || null;
});

// 新規食材登録ボタン
document.getElementById('newFoodRegisterBtn').addEventListener('click', () => {
  const name = newFoodNameEl.value.trim();
  if (!name) { showToast('⚠️ 食材名を入力してください'); newFoodNameEl.focus(); return; }
  if (!newFoodExpiry) { showToast('⚠️ 期限日を選択してください'); return; }

  const memo = document.getElementById('newFoodMemo').value.trim();

  showConfirm({
    title:   newFoodExistingId ? '期限を登録しますか？' : '新規食材を追加しますか？',
    sub:     newFoodExistingId ? '既存の食材に期限を登録します' : '食材マスタに追加して期限を登録します',
    detail:  `
      <p><span class="dl">食材名</span>${escapeHtml(name)}</p>
      <p><span class="dl">期限</span>${formatDate(newFoodExpiry)}</p>
      <p><span class="dl">お気に入り</span>${newFoodIsFav ? '⭐ あり' : 'なし'}</p>
      ${memo ? `<p><span class="dl">メモ</span>${escapeHtml(memo)}</p>` : ''}
    `,
    okLabel: newFoodExistingId ? '登録する' : '追加する',
    callback: async () => {
  try {
    console.log('[newFood] start');

    let foodId = newFoodExistingId;

    if (!foodId) {
      console.log('[newFood] addFood');
      const ref = await addFood(name, newFoodIsFav);
      foodId = ref.id;
      console.log('[newFood] foodId:', foodId);
    } else {
      await updateFood(foodId, { favorite: newFoodIsFav });
    }

    console.log('[newFood] registerInventory');
    await registerInventory(foodId, name, newFoodExpiry, memo, newFoodIsFav);

    showToast(`✅ ${name} を追加しました`);
  } catch (e) {
    console.error('[newFood] error:', e);
    showToast('❌ 追加に失敗しました');
  } finally {
    console.log('[newFood] finally close modal');
    closeNewFoodModal();
    resetNewFoodModal();
  }
}
  });
});

function resetNewFoodModal() {
  newFoodNameEl.value = '';
  newFoodIsFav        = false;
  newFoodExpiry       = null;
  newFoodExistingId   = null;
  newFoodFavBtn.textContent = '☆';
  newFoodFavBtn.classList.remove('active');
  newFoodManualDate.value = '';
  newFoodManualWrap.classList.remove('show');
  newFoodSuggestEl.classList.remove('show');
  document.getElementById('newFoodMemo').value = '';
  document.querySelectorAll('#newFoodModal .date-btn').forEach(b => b.classList.remove('active'));
}


/* ====================================
   確認モーダル（共通）
   ==================================== */
const confirmOverlay = document.getElementById('confirmOverlay');

function showConfirm({ title, sub, detail, okLabel = '登録する', callback }) {
  document.getElementById('confirmTitle').textContent  = title;
  document.getElementById('confirmSub').textContent    = sub || '';
  document.getElementById('confirmDetail').innerHTML   = detail;
  document.getElementById('confirmOk').textContent     = okLabel;
  confirmCallback = callback;
  confirmOverlay.classList.add('show');
}

function hideConfirm() {
  confirmOverlay.classList.remove('show');
  confirmCallback = null;
}

document.getElementById('confirmCancel').addEventListener('click', hideConfirm);

document.getElementById('confirmOk').addEventListener('click', async () => {
  console.log('[confirmOk] clicked');

  const cb = confirmCallback;
  confirmCallback = null;
  confirmOverlay.classList.remove('show');

console.log(confirmOverlay.className);

  if (!cb) {
    console.warn('[confirmOk] callback がありません');
    return;
  }

  try {
    await cb();
  } catch (e) {
    console.error('[confirmOk] callback error:', e);
    showToast('❌ 処理に失敗しました');
  }
});
confirmOverlay.addEventListener('click', e => {
  if (e.target === confirmOverlay) hideConfirm();
});

/* ====================================
   Firebase未設定時の警告バナー（1回のみ表示）
   ==================================== */
let firebaseWarningShown = false;
function showFirebaseWarning() {
  if (firebaseWarningShown) return;
  firebaseWarningShown = true;
  const banner = document.createElement('div');
  banner.style.cssText = `
    background: var(--today-bg);
    border: 2px solid var(--today-b);
    color: var(--today-t);
    border-radius: var(--r);
    padding: 12px 16px;
    margin-bottom: 14px;
    font-size: 0.83rem;
    line-height: 1.6;
  `;
  banner.innerHTML = `
    ⚠️ <strong>Firebase未設定</strong>：データの保存・読み込みができません。<br>
    <code>firebase-config.js</code> に自分のFirebaseプロジェクトの設定を入力してください。<br>
    <span style="color:var(--text-3)">（詳しくはREADME.mdを参照）</span>
  `;
  const main = document.getElementById('mainContent');
  main.insertBefore(banner, main.firstChild);
}

</script>
