<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食材管理 🥦</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ====================================
     ヘッダー & ナビ
     ==================================== -->
<header>
  <div class="header-inner">
    <a class="logo" href="index.html">🥦 食材管理</a>
    <nav>
      <a href="index.html" class="active">ホーム</a>
      <a href="db.html">食材DB</a>
      <a href="history.html">履歴</a>
    </nav>
  </div>
</header>

<!-- ====================================
     メイン：期限ステータス別表示
     ==================================== -->
<main id="mainContent">
  <div class="loading-wrap">
    <div class="spinner"></div>読み込み中…
  </div>
</main>

<!-- ====================================
     FAB（新規食材追加ボタン）
     ==================================== -->
<button class="fab" id="fabBtn" title="新規食材を追加">＋</button>

<!-- ====================================
     ボトムバー：期限登録トグルパネル
     ==================================== -->
<div class="bottom-bar">
  <div class="bottom-bar-inner">

    <!-- 入力パネル（折りたたみ） -->
    <div class="input-panel" id="inputPanel">

      <!-- 検索バー -->
      <div class="search-wrap">
        <input
          type="text"
          class="search-input"
          id="homeSearch"
          placeholder="🔍 食材名を検索して期限を更新…"
          autocomplete="off"
        >
        <!-- サジェストリスト（パネルの上に表示） -->
        <div class="suggest-list" id="homeSuggestList"></div>
      </div>

      <!-- 選択中の食材を表示 -->
      <div id="selectedFoodInfo" style="display:none; margin-bottom:10px;">
        <span style="font-size:0.82rem; color:var(--text-3);">選択中：</span>
        <strong id="selectedFoodName" style="color:var(--primary-d); font-size:0.92rem;"></strong>
      </div>

      <!-- 日数テンプレートボタン -->
      <div class="date-templates">
        <button class="date-btn" data-days="0">今日</button>
        <button class="date-btn" data-days="1">明日</button>
        <button class="date-btn" data-days="3">３日後</button>
        <button class="date-btn" data-days="7">７日後</button>
        <button class="date-btn" data-days="manual">手動入力</button>
      </div>

      <!-- 手動入力欄（「手動入力」ボタンを押したとき表示） -->
      <div class="manual-wrap" id="homeManualWrap">
        <input type="date" id="homeManualDate">
      </div>

      <!-- メモ入力（任意・1行） -->
      <input
        type="text"
        class="memo-input"
        id="homeMemo"
        placeholder="メモ（任意）例: 明治おいしい牛乳"
        maxlength="100"
      >

      <!-- 登録ボタン -->
      <button class="register-btn" id="homeRegisterBtn">期限を登録する</button>
    </div>

    <!-- トグルボタン -->
    <button class="toggle-btn" id="toggleBtn">
      <span>📝 期限を登録する</span>
      <span class="toggle-arrow">▲</span>
    </button>

  </div>
</div>

<!-- ====================================
     新規食材追加モーダル
     ==================================== -->
<div class="modal-overlay" id="newFoodOverlay">
  <div class="modal" id="newFoodModal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span>🌿 新規食材を追加</span>
      <button class="modal-close" id="newFoodClose">✕</button>
    </div>

    <!-- 食材名 ＋ お気に入りボタン -->
    <div class="food-name-row">
      <input
        type="text"
        class="food-name-input"
        id="newFoodName"
        placeholder="食材名を入力…"
        autocomplete="off"
      >
      <button class="fav-toggle-btn" id="newFoodFavBtn" title="お気に入り登録">☆</button>
    </div>

    <!-- モーダル内サジェスト（既存食材の候補） -->
    <div class="modal-suggest-list suggest-list" id="newFoodSuggestList"></div>

    <!-- 日数テンプレート -->
    <div class="date-templates" style="margin-top:4px;">
      <button class="date-btn" data-days="0" id="nf-d0">今日</button>
      <button class="date-btn" data-days="1" id="nf-d1">明日</button>
      <button class="date-btn" data-days="3" id="nf-d3">３日後</button>
      <button class="date-btn" data-days="7" id="nf-d7">７日後</button>
      <button class="date-btn" data-days="manual" id="nf-dm">手動入力</button>
    </div>

    <!-- 手動日付 -->
    <div class="manual-wrap" id="newFoodManualWrap">
      <input type="date" id="newFoodManualDate">
    </div>

    <!-- メモ -->
    <input
      type="text"
      class="memo-input"
      id="newFoodMemo"
      placeholder="メモ（任意）"
      maxlength="100"
      style="margin-top:6px;"
    >

    <!-- 登録ボタン -->
    <button class="register-btn" id="newFoodRegisterBtn">追加する</button>
  </div>
</div>

<!-- ====================================
     確認モーダル
     ==================================== -->
<div class="modal-overlay center" id="confirmOverlay">
  <div class="modal confirm-modal" id="confirmModal">
    <p class="confirm-head" id="confirmTitle">登録しますか？</p>
    <p class="confirm-sub"  id="confirmSub"></p>
    <div class="confirm-detail" id="confirmDetail"></div>
    <div class="confirm-btns">
      <button class="btn-cancel"  id="confirmCancel">キャンセル</button>
      <button class="btn-confirm" id="confirmOk">登録する</button>
    </div>
  </div>
</div>

<!-- トースト通知 -->
<div class="toast" id="toast"></div>


<!-- ====================================
     Firebase & スクリプト
     ==================================== -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>

<script>
/* ============================================================
   index.html — ホームページ ロジック（全面書き直し版）

   ★ 確認ダイアログを Promise 方式に統一
      await confirmDialog({...}) → true(OK) / false(Cancel)
      コールバック変数や disabled ハックを完全廃止
   ============================================================ */

/* ====================================
   状態管理
   ==================================== */
var inventoryItems  = [];   // 在庫リスト（onSnapshot）
var allFoods        = [];   // 食材マスタ
var homeSelectedFood = null;
var homeExpiryDate  = null;
var newFoodIsFav    = false;
var newFoodExpiry   = null;
var newFoodExistingId = null;


/* ====================================
   Promise ベースの確認ダイアログ
   ==================================== */
var _confirmResolve = null;

function confirmDialog(opts) {
  // opts: { title, sub, detail, okLabel }
  return new Promise(function(resolve) {
    _confirmResolve = resolve;
    document.getElementById('confirmTitle').textContent = opts.title  || '';
    document.getElementById('confirmSub').textContent   = opts.sub    || '';
    document.getElementById('confirmDetail').innerHTML  = opts.detail || '';
    document.getElementById('confirmOk').textContent    = opts.okLabel || '登録する';
    document.getElementById('confirmOverlay').classList.add('show');
  });
}

function _closeConfirm(result) {
  document.getElementById('confirmOverlay').classList.remove('show');
  if (_confirmResolve) {
    var fn = _confirmResolve;
    _confirmResolve = null;
    fn(result);
  }
}

document.getElementById('confirmOk').addEventListener('click', function() {
  _closeConfirm(true);
});
document.getElementById('confirmCancel').addEventListener('click', function() {
  _closeConfirm(false);
});
document.getElementById('confirmOverlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('confirmOverlay')) _closeConfirm(false);
});


/* ====================================
   在庫リアルタイム監視
   onSnapshot は orderBy なしで取得し
   JS側でソート → インデックス不要
   ==================================== */
renderHome(); // 即座に空表示（ローディング解除）

db.collection('inventory').onSnapshot(
  function(snap) {
    inventoryItems = snap.docs.map(function(d) {
      return Object.assign({ id: d.id }, d.data());
    });
    // expiryDate でソート
    inventoryItems.sort(function(a, b) {
      return (a.expiryDate || '').localeCompare(b.expiryDate || '');
    });
    renderHome();
  },
  function(err) {
    console.warn('inventory 取得エラー:', err.code, err.message);
    showFirebaseWarning('在庫の読み込みに失敗しました: ' + err.message);
  }
);


/* ====================================
   ホーム画面レンダリング
   ==================================== */
function renderHome() {
  var main    = document.getElementById('mainContent');
  var expired = inventoryItems.filter(function(i) { return getDaysUntil(i.expiryDate) < 0; });
  var todayArr = inventoryItems.filter(function(i) { return getDaysUntil(i.expiryDate) === 0; });
  var soonArr  = inventoryItems.filter(function(i) {
    var d = getDaysUntil(i.expiryDate);
    return d > 0 && d <= 3;
  });

  main.innerHTML =
    renderSection('expired', '🚨 期限切れ', expired,  '期限切れの食材はありません ✨') +
    renderSection('today',   '⏰ 今日まで', todayArr, '今日期限の食材はありません') +
    renderSection('soon',    '📅 ３日以内', soonArr,  '3日以内に期限が来る食材はありません');

  // カードクリック → そのままトグルパネルを開いて食材をセット
  main.querySelectorAll('.food-card[data-invid]').forEach(function(card) {
    card.addEventListener('click', function() {
      var item = inventoryItems.find(function(i) { return i.id === card.dataset.invid; });
      if (!item) return;
      selectHomeFood(item);
      openTogglePanel();
    });
  });
}

function renderSection(status, label, items, emptyMsg) {
  var cards = items.length === 0
    ? '<div class="empty-card">' + emptyMsg + '</div>'
    : items.map(function(item) { return renderFoodCard(item, status); }).join('');
  return '<section class="expiry-section">' +
    '<div class="section-head">' +
      '<span class="badge ' + status + '">' + label + '</span>' +
      '<span class="section-count">' + items.length + '件</span>' +
    '</div>' +
    '<div class="food-grid">' + cards + '</div>' +
    '</section>';
}

function renderFoodCard(item, status) {
  var days  = getDaysUntil(item.expiryDate);
  var label = daysLabel(days);
  return '<div class="food-card ' + status + '" data-invid="' + item.id + '">' +
    '<span class="food-card-fav">' + (item.favorite ? '⭐' : '') + '</span>' +
    '<div class="food-card-body">' +
      '<div class="food-card-name">' + escapeHtml(item.foodName) + '</div>' +
      (item.memo ? '<div class="food-card-memo">' + escapeHtml(item.memo) + '</div>' : '') +
    '</div>' +
    '<div class="food-card-right">' +
      '<div class="food-card-date">' + formatDate(item.expiryDate) + '</div>' +
      '<span class="days-chip ' + status + '">' + label + '</span>' +
    '</div>' +
    '</div>';
}


/* ====================================
   トグルパネル開閉
   ==================================== */
var toggleBtn  = document.getElementById('toggleBtn');
var inputPanel = document.getElementById('inputPanel');
var fabBtn     = document.getElementById('fabBtn');

function openTogglePanel() {
  inputPanel.classList.add('open');
  toggleBtn.classList.add('open');
  fabBtn.classList.add('hidden');
  document.getElementById('homeSearch').focus();
}
function closeTogglePanel() {
  inputPanel.classList.remove('open');
  toggleBtn.classList.remove('open');
  fabBtn.classList.remove('hidden');
}

toggleBtn.addEventListener('click', function() {
  inputPanel.classList.contains('open') ? closeTogglePanel() : openTogglePanel();
});


/* ====================================
   ホーム：食材検索サジェスト
   ==================================== */
var homeSearchEl    = document.getElementById('homeSearch');
var homeSuggestList = document.getElementById('homeSuggestList');
var selFoodInfo     = document.getElementById('selectedFoodInfo');
var selFoodName     = document.getElementById('selectedFoodName');

function selectHomeFood(item) {
  homeSelectedFood       = item;
  homeSearchEl.value     = item.foodName;
  selFoodName.textContent = item.foodName;
  selFoodInfo.style.display = 'block';
  homeSuggestList.classList.remove('show');
}

var homeDebounce;
homeSearchEl.addEventListener('input', function() {
  clearTimeout(homeDebounce);
  homeDebounce = setTimeout(function() {
    homeSelectedFood = null;
    selFoodInfo.style.display = 'none';

    var q = homeSearchEl.value.trim().toLowerCase();
    homeSuggestList.innerHTML = '';
    if (!q) { homeSuggestList.classList.remove('show'); return; }

    var exact   = inventoryItems.filter(function(i) { return i.foodName.toLowerCase() === q; });
    var prefix  = inventoryItems.filter(function(i) { return i.foodName.toLowerCase().startsWith(q) && i.foodName.toLowerCase() !== q; });
    var partial = inventoryItems.filter(function(i) { return i.foodName.toLowerCase().includes(q) && !i.foodName.toLowerCase().startsWith(q); });
    var candidates = exact.concat(prefix).concat(partial).slice(0, 8);

    if (!candidates.length) { homeSuggestList.classList.remove('show'); return; }

    candidates.forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'suggest-item';
      div.innerHTML =
        '<span class="suggest-fav">' + (item.favorite ? '⭐' : '') + '</span>' +
        '<span class="suggest-name">' + escapeHtml(item.foodName) + '</span>' +
        '<span class="suggest-badge">' + formatDate(item.expiryDate) + '</span>';
      div.addEventListener('mousedown', function(e) {
        e.preventDefault();
        selectHomeFood(item);
      });
      homeSuggestList.appendChild(div);
    });
    homeSuggestList.classList.add('show');
  }, 150);
});

homeSearchEl.addEventListener('blur', function() {
  setTimeout(function() { homeSuggestList.classList.remove('show'); }, 200);
});


/* ====================================
   ホーム：日数テンプレート
   ==================================== */
var homeManualWrap = document.getElementById('homeManualWrap');
var homeManualDate = document.getElementById('homeManualDate');

document.querySelectorAll('.input-panel .date-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.input-panel .date-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    if (btn.dataset.days === 'manual') {
      homeManualWrap.classList.add('show');
      homeExpiryDate = homeManualDate.value || null;
    } else {
      homeManualWrap.classList.remove('show');
      homeExpiryDate = getDateStr(Number(btn.dataset.days));
    }
  });
});
homeManualDate.addEventListener('change', function() {
  homeExpiryDate = homeManualDate.value || null;
});


/* ====================================
   ホーム：期限登録
   ==================================== */
document.getElementById('homeRegisterBtn').addEventListener('click', async function() {
  if (!homeSelectedFood) {
    showToast('⚠️ 食材を検索・選択してください');
    homeSearchEl.focus();
    return;
  }
  if (!homeExpiryDate) {
    showToast('⚠️ 期限日を選択してください');
    return;
  }
  var memo = document.getElementById('homeMemo').value.trim();
  var food = homeSelectedFood;
  var date = homeExpiryDate;

  var ok = await confirmDialog({
    title:   '期限を登録しますか？',
    detail:  '<p><span class="dl">食材</span>' + escapeHtml(food.foodName) + '</p>' +
             '<p><span class="dl">期限</span>' + formatDate(date) + '</p>' +
             (memo ? '<p><span class="dl">メモ</span>' + escapeHtml(memo) + '</p>' : ''),
    okLabel: '登録する'
  });
  if (!ok) return;

  try {
    await registerInventory(food.foodId, food.foodName, date, memo, food.favorite);
    showToast('✅ ' + food.foodName + ' の期限を登録しました');
    resetHomePanel();
    closeTogglePanel();
  } catch (e) {
    console.error(e);
    showToast('❌ 登録に失敗しました（' + (e.code || e.message) + '）');
  }
});

function resetHomePanel() {
  homeSearchEl.value = '';
  homeSelectedFood   = null;
  homeExpiryDate     = null;
  selFoodInfo.style.display = 'none';
  document.getElementById('homeMemo').value = '';
  homeManualDate.value = '';
  homeManualWrap.classList.remove('show');
  document.querySelectorAll('.input-panel .date-btn').forEach(function(b) { b.classList.remove('active'); });
}


/* ====================================
   新規食材追加モーダル
   ==================================== */
var newFoodOverlay    = document.getElementById('newFoodOverlay');
var newFoodNameEl     = document.getElementById('newFoodName');
var newFoodSuggestEl  = document.getElementById('newFoodSuggestList');
var newFoodManualWrap = document.getElementById('newFoodManualWrap');
var newFoodManualDate = document.getElementById('newFoodManualDate');
var newFoodFavBtn     = document.getElementById('newFoodFavBtn');

function openNewFoodModal() {
  resetNewFoodModal();
  newFoodOverlay.classList.add('show');
  // 食材マスタをバックグラウンド取得（サジェスト用）
  db.collection('foods').orderBy('name').get()
    .then(function(snap) {
      allFoods = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
    })
    .catch(function(e) { console.warn('食材マスタ取得失敗:', e.message); });
  setTimeout(function() { newFoodNameEl.focus(); }, 300);
}
function closeNewFoodModal() {
  newFoodOverlay.classList.remove('show');
}

fabBtn.addEventListener('click', openNewFoodModal);
document.getElementById('newFoodClose').addEventListener('click', closeNewFoodModal);
newFoodOverlay.addEventListener('click', function(e) {
  if (e.target === newFoodOverlay) closeNewFoodModal();
});

// お気に入りトグル
newFoodFavBtn.addEventListener('click', function() {
  newFoodIsFav = !newFoodIsFav;
  newFoodFavBtn.textContent = newFoodIsFav ? '⭐' : '☆';
  newFoodFavBtn.classList.toggle('active', newFoodIsFav);
});

// サジェスト
var nfDebounce;
newFoodNameEl.addEventListener('input', function() {
  clearTimeout(nfDebounce);
  newFoodExistingId = null;
  nfDebounce = setTimeout(function() {
    var q = newFoodNameEl.value.trim().toLowerCase();
    newFoodSuggestEl.innerHTML = '';
    if (!q) { newFoodSuggestEl.classList.remove('show'); return; }

    var exact   = allFoods.filter(function(f) { return f.name.toLowerCase() === q; });
    var prefix  = allFoods.filter(function(f) { return f.name.toLowerCase().startsWith(q) && f.name.toLowerCase() !== q; });
    var partial = allFoods.filter(function(f) { return f.name.toLowerCase().includes(q) && !f.name.toLowerCase().startsWith(q); });
    var candidates = exact.concat(prefix).concat(partial).slice(0, 8);

    if (!candidates.length) { newFoodSuggestEl.classList.remove('show'); return; }

    candidates.forEach(function(food) {
      var div = document.createElement('div');
      div.className = 'suggest-item';
      div.innerHTML =
        '<span class="suggest-fav">' + (food.favorite ? '⭐' : '') + '</span>' +
        '<span class="suggest-name">' + escapeHtml(food.name) + '</span>' +
        '<span class="suggest-badge">既存</span>';
      div.addEventListener('mousedown', function(e) {
        e.preventDefault();
        newFoodNameEl.value   = food.name;
        newFoodIsFav          = food.favorite;
        newFoodExistingId     = food.id;
        newFoodFavBtn.textContent = newFoodIsFav ? '⭐' : '☆';
        newFoodFavBtn.classList.toggle('active', newFoodIsFav);
        newFoodSuggestEl.classList.remove('show');
      });
      newFoodSuggestEl.appendChild(div);
    });
    newFoodSuggestEl.classList.add('show');
  }, 150);
});
newFoodNameEl.addEventListener('blur', function() {
  setTimeout(function() { newFoodSuggestEl.classList.remove('show'); }, 200);
});

// 日数テンプレート
document.querySelectorAll('#newFoodModal .date-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#newFoodModal .date-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    if (btn.dataset.days === 'manual') {
      newFoodManualWrap.classList.add('show');
      newFoodExpiry = newFoodManualDate.value || null;
    } else {
      newFoodManualWrap.classList.remove('show');
      newFoodExpiry = getDateStr(Number(btn.dataset.days));
    }
  });
});
newFoodManualDate.addEventListener('change', function() {
  newFoodExpiry = newFoodManualDate.value || null;
});

// 新規食材 登録ボタン
document.getElementById('newFoodRegisterBtn').addEventListener('click', async function() {
  var name = newFoodNameEl.value.trim();
  if (!name) { showToast('⚠️ 食材名を入力してください'); newFoodNameEl.focus(); return; }
  if (!newFoodExpiry) { showToast('⚠️ 期限日を選択してください'); return; }

  var memo      = document.getElementById('newFoodMemo').value.trim();
  var isFav     = newFoodIsFav;
  var expiry    = newFoodExpiry;
  var existId   = newFoodExistingId;

  var ok = await confirmDialog({
    title:   existId ? '期限を登録しますか？' : '新規食材を追加しますか？',
    sub:     existId ? '既存の食材に期限を登録します' : '食材マスタに追加して期限を登録します',
    detail:  '<p><span class="dl">食材名</span>' + escapeHtml(name) + '</p>' +
             '<p><span class="dl">期限</span>' + formatDate(expiry) + '</p>' +
             '<p><span class="dl">お気に入り</span>' + (isFav ? '⭐ あり' : 'なし') + '</p>' +
             (memo ? '<p><span class="dl">メモ</span>' + escapeHtml(memo) + '</p>' : ''),
    okLabel: existId ? '登録する' : '追加する'
  });
  if (!ok) return;

  // ★ 確認OK後は即モーダルを閉じる
  closeNewFoodModal();

  try {
    var foodId = existId;
    if (!foodId) {
      var ref = await db.collection('foods').add({
        name: name,
        favorite: isFav,
        createdAt: new Date()
      });
      foodId = ref.id;
    } else {
      await db.collection('foods').doc(foodId).update({ favorite: isFav });
    }
    await registerInventory(foodId, name, expiry, memo, isFav);
    showToast('✅ ' + name + ' を追加しました');
  } catch (e) {
    console.error(e);
    showToast('❌ 追加に失敗しました（' + (e.code || e.message) + '）');
  }
});

function resetNewFoodModal() {
  newFoodNameEl.value   = '';
  newFoodIsFav          = false;
  newFoodExpiry         = null;
  newFoodExistingId     = null;
  newFoodFavBtn.textContent = '☆';
  newFoodFavBtn.classList.remove('active');
  newFoodManualDate.value = '';
  newFoodManualWrap.classList.remove('show');
  newFoodSuggestEl.classList.remove('show');
  document.getElementById('newFoodMemo').value = '';
  document.querySelectorAll('#newFoodModal .date-btn').forEach(function(b) { b.classList.remove('active'); });
}


/* ====================================
   Firebase 警告バナー
   ==================================== */
var _warnShown = false;
function showFirebaseWarning(msg) {
  if (_warnShown) return;
  _warnShown = true;
  var el = document.createElement('div');
  el.style.cssText = 'background:var(--today-bg);border:2px solid var(--today-b);color:var(--today-t);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;font-size:0.83rem;line-height:1.6;';
  el.innerHTML = '⚠️ <strong>Firebase エラー</strong>：' + escapeHtml(msg || '') + '<br><code>firebase-config.js</code> の設定を確認してください。';
  var main = document.getElementById('mainContent');
  main.insertBefore(el, main.firstChild);
}

</script>
