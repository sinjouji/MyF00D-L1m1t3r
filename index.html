<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食材管理 🥦</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">🥦 食材管理</a>
    <nav>
      <a href="index.html" class="active">ホーム</a>
      <a href="db.html">食材DB</a>
      <a href="shopping.html">買い物</a>
      <a href="history.html">履歴</a>
    </nav>
  </div>
</header>

<!-- 期限別リスト -->
<main id="mainContent">
  <div class="loading-wrap"><div class="spinner"></div>読み込み中…</div>
</main>

<!-- FAB：新規食材追加 -->
<button class="fab" id="fabBtn" title="新規食材を追加">＋</button>

<!-- ボトムバー：期限登録トグルパネル -->
<div class="bottom-bar">
  <div class="bottom-bar-inner">
    <div class="input-panel" id="inputPanel">

      <!-- 検索バー（在庫から選ぶ） -->
      <div class="search-wrap">
        <input type="text" class="search-input" id="homeSearch"
               placeholder="🔍 食材名を検索して期限を更新…" autocomplete="off">
        <div class="suggest-list" id="homeSuggestList"></div>
      </div>

      <!-- 選択中の食材 -->
      <div id="selectedFoodInfo" style="display:none; margin-bottom:10px;">
        <span style="font-size:0.82rem; color:var(--text-3);">選択中：</span>
        <strong id="selectedFoodName" style="color:var(--primary-d);"></strong>
      </div>

      <!-- 日数テンプレート -->
      <div class="date-templates" id="homeDateBtns">
        <button class="date-btn" data-days="0">今日</button>
        <button class="date-btn" data-days="1">明日</button>
        <button class="date-btn" data-days="3">３日後</button>
        <button class="date-btn" data-days="7">７日後</button>
        <button class="date-btn" data-days="manual">手動入力</button>
      </div>
      <div class="manual-wrap" id="homeManualWrap">
        <input type="date" id="homeManualDate">
      </div>

      <!-- メモ -->
      <input type="text" class="memo-input" id="homeMemo"
             placeholder="メモ（任意）" maxlength="100">

      <button class="register-btn" id="homeRegisterBtn">期限を登録する</button>
    </div>

    <button class="toggle-btn" id="toggleBtn">
      <span>📝 期限を登録する</span>
      <span class="toggle-arrow">▲</span>
    </button>
  </div>
</div>

<!-- 新規食材追加モーダル -->
<div class="modal-overlay" id="newFoodOverlay">
  <div class="modal" id="newFoodModal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span>🌿 新規食材を追加</span>
      <button class="modal-close" id="newFoodClose">✕</button>
    </div>
    <div class="food-name-row">
      <input type="text" class="food-name-input" id="newFoodName"
             placeholder="食材名を入力…" autocomplete="off">
      <button class="fav-toggle-btn" id="newFoodFavBtn">☆</button>
    </div>
    <div class="suggest-list modal-suggest-list" id="newFoodSuggestList"></div>
    <div class="date-templates" id="newFoodDateBtns">
      <button class="date-btn" data-days="0">今日</button>
      <button class="date-btn" data-days="1">明日</button>
      <button class="date-btn" data-days="3">３日後</button>
      <button class="date-btn" data-days="7">７日後</button>
      <button class="date-btn" data-days="manual">手動入力</button>
    </div>
    <div class="manual-wrap" id="newFoodManualWrap">
      <input type="date" id="newFoodManualDate">
    </div>
    <input type="text" class="memo-input" id="newFoodMemo"
           placeholder="メモ（任意）" maxlength="100" style="margin-top:6px;">
    <button class="register-btn" id="newFoodRegisterBtn">追加する</button>
  </div>
</div>

<!-- 確認モーダル -->
<div class="modal-overlay center" id="confirmOverlay">
  <div class="modal confirm-modal">
    <p class="confirm-head" id="confirmTitle"></p>
    <p class="confirm-sub"  id="confirmSub"></p>
    <div class="confirm-detail" id="confirmDetail"></div>
    <div class="confirm-btns">
      <button class="btn-cancel"  id="confirmCancel">キャンセル</button>
      <button class="btn-confirm" id="confirmOk">登録する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
/* ============================================================
   index.html — ホームページ スクリプト

   【修正ポイント】
   ・ホームのサジェストを inventory + foods（DB登録済み）の両方に対応
   ・selectedFood を必ず { foodId, foodName } 形式に正規化
   ・DBのみ登録食材（inventory未登録）も期限登録できる
   ============================================================ */

initConfirmDialog();

/* ===== 状態変数 ===== */
var inventoryItems    = [];  // inventory コレクション（expiryDate あり）
var foodMap           = {};  // foods コレクション { foodId: {id, name, favorite} }

var homeSelectedFood  = null;  // { foodId, foodName, expiryDate } に正規化済み
var homeExpiryDate    = null;
var newFoodIsFav      = false;
var newFoodExpiry     = null;
var newFoodExistingId = null;

/* 即座に空画面を表示（ローディング解除） */
renderHome();


/* ====================================
   Firestore リスナー（orderBy なし・JSソート）
   ==================================== */

db.collection('inventory').onSnapshot(
  function(snap) {
    inventoryItems = snap.docs.map(function(d) {
      return Object.assign({ id: d.id }, d.data());
    });
    inventoryItems.sort(function(a, b) {
      return (a.expiryDate || '').localeCompare(b.expiryDate || '');
    });
    renderHome();
  },
  function(err) {
    console.error('[inventory] error:', err.code, err.message);
    showBanner('error',
      '⚠️ 在庫の読み込みに失敗しました<br>' +
      'エラー: <code>' + err.code + '</code> — ' + err.message + '<br>' +
      'Firestoreのセキュリティルールが <code>allow read, write: if true</code> か確認してください'
    );
    renderHome();
  }
);

db.collection('foods').onSnapshot(
  function(snap) {
    foodMap = {};
    snap.docs.forEach(function(d) {
      foodMap[d.id] = Object.assign({ id: d.id }, d.data());
    });
    renderHome();
  },
  function(err) {
    console.warn('[foods] error:', err.code, err.message);
  }
);


/* ====================================
   バナー表示
   ==================================== */
function showBanner(type, html) {
  var el = document.getElementById('_banner');
  if (!el) {
    el = document.createElement('div');
    el.id = '_banner';
    var main = document.getElementById('mainContent');
    main.parentNode.insertBefore(el, main);
  }
  var isErr = type === 'error';
  el.style.cssText =
    'background:' + (isErr ? 'var(--expired-bg)' : 'var(--today-bg)') + ';' +
    'border:2px solid ' + (isErr ? 'var(--expired-b)' : 'var(--today-b)') + ';' +
    'color:' + (isErr ? 'var(--expired-t)' : 'var(--today-t)') + ';' +
    'border-radius:var(--r);padding:12px 16px;margin:8px 16px 0;font-size:0.83rem;' +
    'line-height:1.7;max-width:608px;margin-left:auto;margin-right:auto;display:block;';
  el.innerHTML = html;
}


/* ====================================
   ホーム レンダリング（4セクション）
   ==================================== */
function renderHome() {
  /* inventoryItems にお気に入り情報をマージ */
  var items = inventoryItems.map(function(inv) {
    var food = foodMap[inv.foodId] || {};
    return Object.assign({}, inv, { favorite: !!food.favorite });
  });

  var expired  = items.filter(function(i) { return getDaysUntil(i.expiryDate) < 0; });
  var todayArr = items.filter(function(i) { return getDaysUntil(i.expiryDate) === 0; });
  var soon     = items.filter(function(i) { var d = getDaysUntil(i.expiryDate); return d > 0 && d <= 3; });
  var normal   = items.filter(function(i) { return getDaysUntil(i.expiryDate) > 3; });

  var main = document.getElementById('mainContent');
  main.innerHTML =
    buildSection('expired', '🚨 期限切れ', expired,  '期限切れの食材はありません ✨') +
    buildSection('today',   '⏰ 今日まで', todayArr, '今日期限の食材はありません') +
    buildSection('soon',    '📅 ３日以内', soon,     '３日以内に期限が来る食材はありません') +
    buildSection('normal',  '📦 在庫中',   normal,   '');

  /* カードクリック → トグルパネルを開いてその食材をセット */
  main.querySelectorAll('.food-card[data-invid]').forEach(function(card) {
    card.addEventListener('click', function() {
      var inv = inventoryItems.find(function(i) { return i.id === card.dataset.invid; });
      if (inv) { selectHomeFood(normalizeInvItem(inv)); openPanel(); }
    });
  });
}

function buildSection(status, label, items, emptyMsg) {
  if (status === 'normal' && items.length === 0) return '';
  var inner = items.length === 0
    ? '<div class="empty-card">' + emptyMsg + '</div>'
    : items.map(function(i) { return buildFoodCard(i, status); }).join('');
  return (
    '<section class="expiry-section">' +
      '<div class="section-head">' +
        '<span class="badge ' + status + '">' + label + '</span>' +
        '<span class="section-count">' + items.length + '件</span>' +
      '</div>' +
      '<div class="food-grid">' + inner + '</div>' +
    '</section>'
  );
}

function buildFoodCard(item, status) {
  var days = getDaysUntil(item.expiryDate);
  return (
    '<div class="food-card ' + status + '" data-invid="' + item.id + '">' +
      '<span class="food-card-fav">' + (item.favorite ? '⭐' : '') + '</span>' +
      '<div class="food-card-body">' +
        '<div class="food-card-name">' + escapeHtml(item.foodName) + '</div>' +
        (item.memo ? '<div class="food-card-memo">' + escapeHtml(item.memo) + '</div>' : '') +
      '</div>' +
      '<div class="food-card-right">' +
        '<div class="food-card-date">' + formatDate(item.expiryDate) + '</div>' +
        '<span class="days-chip ' + status + '">' + daysLabel(days) + '</span>' +
      '</div>' +
    '</div>'
  );
}

/**
 * inventory アイテム → ホーム操作用に正規化
 * 必ず { foodId, foodName, expiryDate, memo } を持つオブジェクトを返す
 */
function normalizeInvItem(inv) {
  return {
    foodId:     inv.foodId  || inv.id,   // inventory の doc ID は foodId
    foodName:   inv.foodName || inv.name || '',
    expiryDate: inv.expiryDate || null,
    memo:       inv.memo || ''
  };
}

/**
 * foods コレクションのアイテム → ホーム操作用に正規化
 * inventory 未登録の食材を選んだときに使う
 */
function normalizeFoodItem(food) {
  return {
    foodId:     food.id,
    foodName:   food.name || '',
    expiryDate: null,
    memo:       ''
  };
}


/* ====================================
   トグルパネル開閉
   ==================================== */
var toggleBtn  = document.getElementById('toggleBtn');
var inputPanel = document.getElementById('inputPanel');
var fabBtn     = document.getElementById('fabBtn');

function openPanel() {
  inputPanel.classList.add('open');
  toggleBtn.classList.add('open');
  fabBtn.classList.add('hidden');
  document.getElementById('homeSearch').focus();
}
function closePanel() {
  inputPanel.classList.remove('open');
  toggleBtn.classList.remove('open');
  fabBtn.classList.remove('hidden');
}
toggleBtn.addEventListener('click', function() {
  inputPanel.classList.contains('open') ? closePanel() : openPanel();
});


/* ====================================
   トグルパネル：検索サジェスト

   ★ 修正箇所:
      inventory（期限登録済み） + foods（DB登録のみ・未在庫）を
      両方サジェスト候補に含める
   ==================================== */
var homeSearchEl    = document.getElementById('homeSearch');
var homeSuggestList = document.getElementById('homeSuggestList');
var selFoodInfo     = document.getElementById('selectedFoodInfo');
var selFoodName     = document.getElementById('selectedFoodName');

function selectHomeFood(normalized) {
  /* normalized = { foodId, foodName, expiryDate, memo } */
  homeSelectedFood        = normalized;
  homeSearchEl.value      = normalized.foodName;
  selFoodName.textContent = normalized.foodName;
  selFoodInfo.style.display = 'block';
  homeSuggestList.classList.remove('show');
}

var homeSearchTimer;
homeSearchEl.addEventListener('input', function() {
  clearTimeout(homeSearchTimer);
  homeSearchTimer = setTimeout(function() {
    homeSelectedFood = null;
    selFoodInfo.style.display = 'none';

    var q = homeSearchEl.value.trim();
    homeSuggestList.innerHTML = '';
    if (!q) { homeSuggestList.classList.remove('show'); return; }

    /* ── inventory 候補（期限登録済み） ── */
    var invCandidates = suggestSort(q, inventoryItems, 'foodName', 8);

    /* ── foods-only 候補（DBにはあるが inventory 未登録） ── */
    /* inventory に既に入っている foodId を除外する */
    var invFoodIds = {};
    inventoryItems.forEach(function(i) { invFoodIds[i.foodId] = true; });

    var foodsOnly = Object.values(foodMap).filter(function(f) {
      return !invFoodIds[f.id];  // inventory に無いものだけ
    });
    var foodCandidates = suggestSort(q, foodsOnly, 'name', 8 - invCandidates.length);

    if (!invCandidates.length && !foodCandidates.length) {
      homeSuggestList.classList.remove('show'); return;
    }

    /* inventory 候補を表示 */
    invCandidates.forEach(function(inv) {
      var div = document.createElement('div');
      div.className = 'suggest-item';
      var isFav = !!(foodMap[inv.foodId] && foodMap[inv.foodId].favorite);
      div.innerHTML =
        '<span class="suggest-fav">' + (isFav ? '⭐' : '') + '</span>' +
        '<span class="suggest-name">' + escapeHtml(inv.foodName) + '</span>' +
        '<span class="suggest-badge">' + formatDate(inv.expiryDate) + '</span>';
      div.addEventListener('mousedown', function(e) {
        e.preventDefault();
        selectHomeFood(normalizeInvItem(inv));
      });
      homeSuggestList.appendChild(div);
    });

    /* foods-only 候補を表示（「未登録」バッジ付き） */
    foodCandidates.forEach(function(food) {
      var div = document.createElement('div');
      div.className = 'suggest-item';
      div.innerHTML =
        '<span class="suggest-fav">' + (food.favorite ? '⭐' : '') + '</span>' +
        '<span class="suggest-name">' + escapeHtml(food.name) + '</span>' +
        '<span class="suggest-badge" style="color:var(--accent);">未登録</span>';
      div.addEventListener('mousedown', function(e) {
        e.preventDefault();
        selectHomeFood(normalizeFoodItem(food));
      });
      homeSuggestList.appendChild(div);
    });

    homeSuggestList.classList.add('show');
  }, 150);
});
homeSearchEl.addEventListener('blur', function() {
  setTimeout(function() { homeSuggestList.classList.remove('show'); }, 200);
});


/* ====================================
   トグルパネル：日数テンプレート
   ==================================== */
var homeManualWrap = document.getElementById('homeManualWrap');
var homeManualDate = document.getElementById('homeManualDate');

document.querySelectorAll('#homeDateBtns .date-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#homeDateBtns .date-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    if (btn.dataset.days === 'manual') {
      homeManualWrap.classList.add('show');
      homeExpiryDate = homeManualDate.value || null;
    } else {
      homeManualWrap.classList.remove('show');
      homeExpiryDate = getDateStr(Number(btn.dataset.days));
    }
  });
});
homeManualDate.addEventListener('change', function() {
  homeExpiryDate = homeManualDate.value || null;
});


/* ====================================
   トグルパネル：期限登録

   ★ homeSelectedFood は必ず { foodId, foodName } を持っている
      （normalizeInvItem / normalizeFoodItem で正規化済み）
   ==================================== */
document.getElementById('homeRegisterBtn').addEventListener('click', async function() {
  if (!homeSelectedFood) {
    showToast('⚠️ 食材を選択してください'); homeSearchEl.focus(); return;
  }
  if (!homeExpiryDate) {
    showToast('⚠️ 期限日を選択してください'); return;
  }

  var food = homeSelectedFood;  /* { foodId, foodName } */
  var date = homeExpiryDate;
  var memo = document.getElementById('homeMemo').value.trim();

  var ok = await confirmDialog({
    title:   '期限を登録しますか？',
    detail:  '<p><span class="dl">食材</span>'  + escapeHtml(food.foodName) + '</p>' +
             '<p><span class="dl">期限</span>'  + formatDate(date) + '</p>' +
             (memo ? '<p><span class="dl">メモ</span>' + escapeHtml(memo) + '</p>' : ''),
    okLabel: '登録する'
  });
  if (!ok) return;

  try {
    /* inventory に upsert（doc ID = foodId で統一） */
    await db.collection('inventory').doc(food.foodId).set({
      foodId:     food.foodId,
      foodName:   food.foodName,
      expiryDate: date,
      memo:       memo,
      updatedAt:  new Date()
    });
    /* 履歴に追記 */
    await db.collection('history').add({
      foodId:       food.foodId,
      foodName:     food.foodName,
      expiryDate:   date,
      memo:         memo,
      registeredAt: new Date()
    });
    showToast('✅ ' + food.foodName + ' の期限を登録しました');
    resetPanel();
    closePanel();
  } catch (e) {
    console.error('[期限登録エラー]', e.code, e.message, e);
    showBanner('error',
      '❌ 書き込みに失敗しました<br>' +
      'エラー: <code>' + (e.code || 'unknown') + '</code> — ' + e.message
    );
  }
});

function resetPanel() {
  homeSearchEl.value = '';
  homeSelectedFood   = null;
  homeExpiryDate     = null;
  selFoodInfo.style.display = 'none';
  document.getElementById('homeMemo').value = '';
  homeManualDate.value = '';
  homeManualWrap.classList.remove('show');
  document.querySelectorAll('#homeDateBtns .date-btn').forEach(function(b) { b.classList.remove('active'); });
}


/* ====================================
   新規食材追加モーダル
   ==================================== */
var newFoodOverlay    = document.getElementById('newFoodOverlay');
var newFoodNameEl     = document.getElementById('newFoodName');
var newFoodSuggestEl  = document.getElementById('newFoodSuggestList');
var newFoodManualWrap = document.getElementById('newFoodManualWrap');
var newFoodManualDate = document.getElementById('newFoodManualDate');
var newFoodFavBtn     = document.getElementById('newFoodFavBtn');

function openNewFoodModal() {
  newFoodNameEl.value       = '';
  newFoodIsFav              = false;
  newFoodExpiry             = null;
  newFoodExistingId         = null;
  newFoodFavBtn.textContent = '☆';
  newFoodFavBtn.classList.remove('active');
  newFoodManualDate.value   = '';
  newFoodManualWrap.classList.remove('show');
  newFoodSuggestEl.innerHTML = '';
  newFoodSuggestEl.classList.remove('show');
  document.getElementById('newFoodMemo').value = '';
  document.querySelectorAll('#newFoodDateBtns .date-btn').forEach(function(b) { b.classList.remove('active'); });
  newFoodOverlay.classList.add('show');
  setTimeout(function() { newFoodNameEl.focus(); }, 300);
}
function closeNewFoodModal() {
  newFoodOverlay.classList.remove('show');
}

fabBtn.addEventListener('click', openNewFoodModal);
document.getElementById('newFoodClose').addEventListener('click', closeNewFoodModal);
newFoodOverlay.addEventListener('click', function(e) {
  if (e.target === newFoodOverlay) closeNewFoodModal();
});
newFoodFavBtn.addEventListener('click', function() {
  newFoodIsFav = !newFoodIsFav;
  newFoodFavBtn.textContent = newFoodIsFav ? '⭐' : '☆';
  newFoodFavBtn.classList.toggle('active', newFoodIsFav);
});

/* 食材名サジェスト（foods から） */
var nfTimer;
newFoodNameEl.addEventListener('input', function() {
  clearTimeout(nfTimer);
  newFoodExistingId = null;
  nfTimer = setTimeout(function() {
    var foodList = Object.values(foodMap);
    var candidates = suggestSort(newFoodNameEl.value, foodList, 'name', 8);
    newFoodSuggestEl.innerHTML = '';
    if (!candidates.length || !newFoodNameEl.value.trim()) {
      newFoodSuggestEl.classList.remove('show'); return;
    }
    candidates.forEach(function(food) {
      var div = document.createElement('div');
      div.className = 'suggest-item';
      div.innerHTML =
        '<span class="suggest-fav">' + (food.favorite ? '⭐' : '') + '</span>' +
        '<span class="suggest-name">' + escapeHtml(food.name) + '</span>' +
        '<span class="suggest-badge">既存</span>';
      div.addEventListener('mousedown', function(e) {
        e.preventDefault();
        newFoodNameEl.value   = food.name;
        newFoodIsFav          = !!food.favorite;
        newFoodExistingId     = food.id;
        newFoodFavBtn.textContent = newFoodIsFav ? '⭐' : '☆';
        newFoodFavBtn.classList.toggle('active', newFoodIsFav);
        newFoodSuggestEl.classList.remove('show');
      });
      newFoodSuggestEl.appendChild(div);
    });
    newFoodSuggestEl.classList.add('show');
  }, 150);
});
newFoodNameEl.addEventListener('blur', function() {
  setTimeout(function() { newFoodSuggestEl.classList.remove('show'); }, 200);
});

/* 日数テンプレート */
document.querySelectorAll('#newFoodDateBtns .date-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#newFoodDateBtns .date-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    if (btn.dataset.days === 'manual') {
      newFoodManualWrap.classList.add('show');
      newFoodExpiry = newFoodManualDate.value || null;
    } else {
      newFoodManualWrap.classList.remove('show');
      newFoodExpiry = getDateStr(Number(btn.dataset.days));
    }
  });
});
newFoodManualDate.addEventListener('change', function() {
  newFoodExpiry = newFoodManualDate.value || null;
});

/* 新規食材 登録ボタン */
document.getElementById('newFoodRegisterBtn').addEventListener('click', async function() {
  var name = newFoodNameEl.value.trim();
  if (!name) { showToast('⚠️ 食材名を入力してください'); newFoodNameEl.focus(); return; }
  if (!newFoodExpiry) { showToast('⚠️ 期限日を選択してください'); return; }

  var memo    = document.getElementById('newFoodMemo').value.trim();
  var isFav   = newFoodIsFav;
  var expiry  = newFoodExpiry;
  var existId = newFoodExistingId;

  var ok = await confirmDialog({
    title:   existId ? '期限を登録しますか？' : '新規食材を追加しますか？',
    sub:     existId ? '既存食材の在庫を更新します' : '食材DBに追加して在庫に登録します',
    detail:  '<p><span class="dl">食材名</span>' + escapeHtml(name) + '</p>' +
             '<p><span class="dl">期限</span>' + formatDate(expiry) + '</p>' +
             '<p><span class="dl">お気に入り</span>' + (isFav ? '⭐' : 'なし') + '</p>' +
             (memo ? '<p><span class="dl">メモ</span>' + escapeHtml(memo) + '</p>' : ''),
    okLabel: existId ? '登録する' : '追加する'
  });
  if (!ok) return;

  closeNewFoodModal();

  try {
    var foodId = existId;

    if (!foodId) {
      /* 新規食材を foods に追加 */
      var ref = await db.collection('foods').add({
        name:      name,
        favorite:  isFav,
        createdAt: new Date()
      });
      foodId = ref.id;
    } else {
      /* 既存食材のお気に入りを更新 */
      await db.collection('foods').doc(foodId).update({ favorite: isFav });
    }

    /* inventory に upsert（doc ID = foodId） */
    await db.collection('inventory').doc(foodId).set({
      foodId:     foodId,
      foodName:   name,
      expiryDate: expiry,
      memo:       memo,
      updatedAt:  new Date()
    });

    /* 履歴に追記 */
    await db.collection('history').add({
      foodId:       foodId,
      foodName:     name,
      expiryDate:   expiry,
      memo:         memo,
      registeredAt: new Date()
    });

    showToast('✅ ' + name + ' を追加しました');
  } catch (e) {
    console.error('[新規食材エラー]', e.code, e.message, e);
    showBanner('error',
      '❌ 追加に失敗しました<br>' +
      'エラー: <code>' + (e.code || 'unknown') + '</code> — ' + e.message
    );
  }
});
</script>
</body>
</html>
