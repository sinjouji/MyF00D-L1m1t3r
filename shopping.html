<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>買い物メモ 🛒</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css?v=9">
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7BA05B">
<link rel="icon" type="image/png" href="assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <style>
    body { padding-bottom: 220px; }

    /* ===== カテゴリフィルタータブ ===== */
    .cat-tabs {
      display: flex;
      gap: 6px;
      padding: 10px 16px 0;
      max-width: 640px;
      margin: 0 auto;
      flex-wrap: wrap;
    }

    /* ===== 入力エリア（固定ボトム） ===== */
    .shop-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
    }
    .shop-bottom-inner {
      max-width: 640px;
      margin: 0 auto;
      background: var(--surface);
      border-top: 2px solid var(--border);
      padding: 12px 16px 20px;
      box-shadow: 0 -4px 20px rgba(100,80,40,0.1);
    }

    /* 名前行 */
    .shop-add-name-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .shop-add-name-row input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: var(--r);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      background: var(--bg);
      transition: border-color 0.2s;
    }
    .shop-add-name-row input[type="text"]:focus { border-color: var(--primary); }

    /* カテゴリ選択ボタン（食材 / 雑貨） */
    .cat-select-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .cat-select-btn {
      flex: 1;
      padding: 7px;
      border: 2px solid var(--border);
      border-radius: var(--r);
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-2);
      background: var(--surface);
      transition: all 0.18s;
    }
    .cat-select-btn:hover { border-color: var(--primary); }
    .cat-select-btn.active.food { background: var(--primary-l); border-color: var(--primary); color: var(--primary-d); }
    .cat-select-btn.active.misc { background: #EBE4F5; border-color: #9B7EC8; color: #5A4480; }

    /* メモ+登録行 */
    .shop-add-bottom-row {
      display: flex;
      gap: 8px;
    }
    .shop-add-bottom-row input[type="text"] {
      flex: 1;
      padding: 9px 12px;
      border: 2px solid var(--border);
      border-radius: var(--r);
      font-family: var(--font-body);
      font-size: 0.88rem;
      outline: none;
      background: var(--bg);
      transition: border-color 0.2s;
    }
    .shop-add-bottom-row input[type="text"]:focus { border-color: var(--primary); }
    .shop-add-bottom-row .register-btn {
      width: auto;
      padding: 9px 20px;
      white-space: nowrap;
    }

    /* サジェストリスト（入力パネルの上に出る） */
    .shop-suggest-wrap { position: relative; }
    .shop-suggest-list {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--r);
      max-height: 160px;
      overflow-y: auto;
      z-index: 400;
      box-shadow: var(--shadow-lg);
      display: none;
    }
    .shop-suggest-list.show { display: block; }

    /* 操作ボタン行（チェック済み削除など） */
    .shop-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 8px 16px 0;
      max-width: 640px;
      margin: 0 auto;
    }
    .count-label {
      font-size: 0.78rem;
      color: var(--text-3);
      align-self: center;
      margin-right: auto;
    }
    
    
/* ===== 買い物アイテム ===== */

.shop-item {
  display: grid;
  grid-template-columns: 34px 1fr 30px;

  align-items: center;
  gap: 10px;

  background: var(--surface);
  border-radius: var(--r);

  padding: 10px 12px;
  margin-bottom: 8px;

  box-shadow: var(--shadow);
}

.shop-check {
  width: 26px;
  height: 26px;

  border-radius: 50%;

  border: 2px solid var(--border);

  display: flex;
  align-items: center;
  justify-content: center;

  font-weight: 800;
  font-size: 0.9rem;

  color: white;
  background: var(--surface-2);

  transition: all 0.18s;
}

.shop-item.is-checked .shop-check {
  background: var(--primary);
  border-color: var(--primary);
}

.shop-item-body {
  min-width: 0;
}

.shop-name {
  font-size: 0.92rem;
  font-weight: 700;

  display: flex;
  align-items: center;
  gap: 6px;

  flex-wrap: wrap;
}

.shop-item.is-checked .shop-name {
  text-decoration: line-through;
  color: var(--text-3);
}

.shop-memo {
  margin-top: 2px;

  font-size: 0.75rem;
  color: var(--text-3);
}

.shop-item.is-checked .shop-memo {
  opacity: 0.7;
}

.cat-label {
  font-size: 0.68rem;
  padding: 1px 7px;

  border-radius: var(--r-full);

  white-space: nowrap;
}

.cat-label.food {
  background: var(--primary-l);
  color: var(--primary-d);
}

.cat-label.misc {
  background: #EBE4F5;
  color: #5A4480;
}

.shop-item .icon-btn.del {
  width: 26px;
  height: 26px;

  font-size: 0.75rem;
}

/*↑↓入れ替えボタン*/
.shop-item {
  grid-template-columns: 34px 1fr auto;
}

.shop-item .list-item-actions {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.shop-item .move-up,
.shop-item .move-down,
.shop-item .icon-btn.del {
  width: 36px;
  height: 36px;
  font-size: 1rem;
}
    
    
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">🥦 食材管理</a>
    <nav>
      <a href="index.html">ホーム</a>
      <a href="mealplan.html">献立計画</a>
      <a href="db.html">食材DB</a>
      <a href="shopping.html" class="active">買い物</a>
      <a href="history.html">履歴</a>
    </nav>
  </div>
</header>

<!-- カテゴリタブ -->
<div class="cat-tabs">
  <button class="cat-chip active" data-cat="all">すべて</button>
  <button class="cat-chip" data-cat="food">🥦 食材</button>
  <button class="cat-chip" data-cat="misc">🧴 雑貨</button>
</div>

<!-- 操作ボタン -->
<div class="shop-actions">
  <span class="count-label" id="shopCount">0 件</span>
  <label class="start-page-setting">
  <input type="checkbox" id="shoppingStartToggle">
  🛒 初期表示
</label>
  <button class="clear-btn" id="clearCheckedBtn">✅ 済みを削除</button>
  <button class="clear-btn" id="clearAllBtn" style="border-color:var(--expired-b);color:var(--expired-t);">
    🗑️ 全削除
  </button>
</div>

<!-- アイテムリスト -->
<div class="list-wrap" style="margin-top:6px;">
  <div id="shopList">
    <div class="loading-wrap"><div class="spinner"></div>読み込み中…</div>
  </div>
</div>

<!-- 固定ボトム入力エリア -->
<div class="shop-bottom">
  <div class="shop-bottom-inner">

    <!-- 名前入力 + サジェスト -->
    <div class="shop-suggest-wrap">
      <div class="shop-suggest-list" id="shopSuggestList"></div>
      <div class="shop-add-name-row">
        <input type="text" id="shopItemName" placeholder="アイテム名を入力…" autocomplete="off" maxlength="60">
      </div>
    </div>

    <!-- カテゴリ選択 -->
    <div class="cat-select-row">
      <button class="cat-select-btn active food" data-sel="food">🥦 食材</button>
      <button class="cat-select-btn misc" data-sel="misc">🧴 雑貨</button>
      <button class="filter-chip" id="addDividerBtn">＋ 区切り線</button>
    </div>

    <!-- メモ + 追加ボタン -->
    <div class="shop-add-bottom-row">
      <input type="text" id="shopItemMemo" placeholder="メモ（任意）" maxlength="100">
      <button class="register-btn" id="shopAddBtn">追加</button>
    </div>

  </div>
</div>

<!-- 確認モーダル -->
<div class="modal-overlay center" id="confirmOverlay">
  <div class="modal confirm-modal">
    <p class="confirm-head" id="confirmTitle"></p>
    <p class="confirm-sub"  id="confirmSub"></p>
    <div class="confirm-detail" id="confirmDetail"></div>
    <div class="confirm-btns">
      <button class="btn-cancel"  id="confirmCancel">キャンセル</button>
      <button class="btn-confirm" id="confirmOk">実行する</button>
    </div>
  </div>
</div>


<div class="modal-overlay center" id="shopExpiryOverlay">
  <div class="modal confirm-modal">
    <p class="confirm-head">📅 期限を登録</p>
    <p class="confirm-sub" id="shopExpiryFoodName"></p>

    <div class="date-templates" id="shopExpiryDateBtns">
      <button class="date-btn" data-days="none">期限なし</button>
      <button class="date-btn" data-days="0">今日</button>
<button class="date-btn" data-days="1">明日</button>
<button class="date-btn" data-days="2">２日後</button>
<button class="date-btn" data-days="3">３日後</button>
<button class="date-btn" data-days="4">４日後</button>
<button class="date-btn" data-days="5">５日後</button>
<button class="date-btn" data-days="7">７日後</button>
<button class="date-btn" data-days="30">１か月後</button>
      <button class="date-btn" data-days="manual">手動入力</button>
    </div>

    <div class="manual-wrap" id="shopExpiryManualWrap">
      <input type="date" id="shopExpiryManualDate">
    </div>

    <input type="text" class="memo-input" id="shopExpiryMemo"
           placeholder="メモ（任意）" maxlength="100">

    <div class="confirm-btns">
      <button class="btn-cancel" id="shopExpiryCancel">キャンセル</button>
      <button class="btn-confirm" id="shopExpiryOk">登録する</button>
    </div>
  </div>
</div>


<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script src="js/shopping.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
