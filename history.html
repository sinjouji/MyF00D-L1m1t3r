<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>履歴 🥦</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css?v=9">
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7BA05B">
<link rel="icon" type="image/png" href="assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <style>
    .page-filter-bar { top: 58px; }

    .hist-item {
      background: var(--surface);
      border-radius: var(--r);
      padding: 10px 14px;
      margin-bottom: 7px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      transition: box-shadow 0.15s;
    }
    .hist-item:hover { box-shadow: var(--shadow-lg); }
    .hist-left  { flex: 1; min-width: 0; }
    .hist-right { flex-shrink: 0; }

    .hist-name {
      font-weight: 700;
      font-size: 0.92rem;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }
    .hist-expiry-chip {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: var(--r-full);
      white-space: nowrap;
    }
    .hist-expiry-chip.expired { background: var(--expired-bg); color: var(--expired-t); }
    .hist-expiry-chip.today   { background: var(--today-bg);   color: var(--today-t); }
    .hist-expiry-chip.soon    { background: var(--soon-bg);    color: var(--soon-t); }
    .hist-expiry-chip.normal  { background: var(--primary-l);  color: var(--primary-d); }

    .hist-memo {
      font-size: 0.78rem;
      color: var(--text-2);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hist-meta { font-size: 0.74rem; color: var(--text-3); margin-top: 3px; }

    .highlight {
      background: var(--today-bg);
      color: var(--today-t);
      border-radius: 2px;
      padding: 0 1px;
    }

    .bulk-delete-btn {
      padding: 6px 14px;
      border: 2px solid var(--expired-b);
      border-radius: var(--r-full);
      background: var(--expired-bg);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--expired-t);
      transition: all 0.18s;
      white-space: nowrap;
    }
    .bulk-delete-btn:hover { background: var(--expired-t); color: white; border-color: var(--expired-t); }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 16px 0;
      font-size: 0.84rem;
      color: var(--text-2);
    }
    .page-btn {
      padding: 6px 14px;
      border: 2px solid var(--border);
      border-radius: var(--r-full);
      background: var(--surface);
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-2);
      transition: all 0.18s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary-d); }
    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  </style>
</head>
<body class="history-page">

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">🥦 食材管理</a>
    <nav>
      <a href="index.html">ホーム</a>
      <a href="db.html">食材DB</a>
      <a href="shopping.html">買い物</a>
      <a href="history.html" class="active">履歴</a>
    </nav>
  </div>
</header>

<div class="page-filter-bar">
  <div class="page-filter-inner">

    <button class="filter-toggle-btn" id="historyFilterToggle">
      🔍 検索・絞り込み
      <span id="historyFilterArrow">▼</span>
    </button>

    <div class="filter-panel" id="historyFilterPanel">

      <p class="page-title">📋 登録履歴</p>

      <div class="filter-row">
        <input type="text"
               class="filter-input"
               id="histSearch"
               placeholder="🔍 食材名・メモで検索…">

        <button class="filter-chip"
                id="histFavFilter">
          ⭐ お気に入り
        </button>
        
        <button id="clearDateBtn"
          style="font-size:0.75rem;
                 color:var(--text-3);
                 border:2px solid var(--text-3);
                 border-radius:999px;
                 padding:2px 5px;
                 cursor:pointer;">
          日付クリア
        </button>
        
      </div>

      <div class="date-filter-row">

        <label>登録日：</label>

        <input type="date"
               class="date-filter-input"
               id="dateFrom">

        <span style="color:var(--text-3);font-size:0.85rem;">
          〜
        </span>

        <input type="date"
               class="date-filter-input"
               id="dateTo">


<button class="bulk-delete-btn"
                id="bulkDeleteBtn">
          🗑️ 全ての履歴を削除
        </button>

      </div>

    </div>

  </div>
</div>

<div class="list-wrap">
  <p class="list-count" id="histCount">読み込み中…</p>
  <div id="histList">
    <div class="loading-wrap"><div class="spinner"></div>読み込み中…</div>
  </div>
  <div class="pagination" id="pagination" style="display:none;">
    <button class="page-btn" id="prevPage">◀ 前へ</button>
    <span id="pageInfo">1 / 1</span>
    <button class="page-btn" id="nextPage">次へ ▶</button>
  </div>
</div>

<!-- 確認モーダル -->
<div class="modal-overlay center" id="confirmOverlay">
  <div class="modal confirm-modal">
    <p class="confirm-head" id="confirmTitle"></p>
    <p class="confirm-sub"  id="confirmSub"></p>
    <div class="confirm-detail" id="confirmDetail"></div>
    <div class="confirm-btns">
      <button class="btn-cancel"  id="confirmCancel">キャンセル</button>
      <button class="btn-confirm" id="confirmOk"
              style="background:var(--expired-t);">削除する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script src="js/history.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
