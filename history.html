<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>履歴 🥦</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ===== 履歴ページ固有スタイル ===== */

    /* フィルターバーを少し広げる */
    .page-filter-bar { top: 58px; }

    /* 履歴アイテムのレイアウト調整 */
    .hist-item {
      background: var(--surface);
      border-radius: var(--r);
      padding: 10px 14px;
      margin-bottom: 7px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      transition: box-shadow 0.15s;
    }
    .hist-item:hover { box-shadow: var(--shadow-lg); }

    .hist-left { flex: 1; min-width: 0; }

    .hist-name {
      font-weight: 700;
      font-size: 0.92rem;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    /* 期限チップ（履歴では当時の日付に色付け） */
    .hist-expiry-chip {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: var(--r-full);
      white-space: nowrap;
    }
    .hist-expiry-chip.expired { background: var(--expired-bg); color: var(--expired-t); }
    .hist-expiry-chip.today   { background: var(--today-bg);   color: var(--today-t); }
    .hist-expiry-chip.soon    { background: var(--soon-bg);     color: var(--soon-t); }
    .hist-expiry-chip.ok      { background: var(--primary-l);   color: var(--primary-d); }

    .hist-meta {
      font-size: 0.74rem;
      color: var(--text-3);
      margin-top: 3px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hist-memo {
      font-size: 0.78rem;
      color: var(--text-2);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hist-right { flex-shrink: 0; }

    /* 一括削除ボタン */
    .bulk-delete-btn {
      padding: 6px 14px;
      border: 2px solid var(--expired-b);
      border-radius: var(--r-full);
      background: var(--expired-bg);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--expired-t);
      transition: all 0.18s;
      white-space: nowrap;
    }
    .bulk-delete-btn:hover { background: var(--expired-t); color: white; border-color: var(--expired-t); }

    /* ページング */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 16px 0;
      font-size: 0.84rem;
      color: var(--text-2);
    }
    .page-btn {
      padding: 6px 14px;
      border: 2px solid var(--border);
      border-radius: var(--r-full);
      background: var(--surface);
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-2);
      transition: all 0.18s;
    }
    .page-btn:hover:not(:disabled)  { border-color: var(--primary); color: var(--primary-d); }
    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* キーワードハイライト */
    .highlight {
      background: var(--today-bg);
      color: var(--today-t);
      border-radius: 2px;
      padding: 0 1px;
    }
  </style>
</head>
<body>

<!-- ====================================
     ヘッダー & ナビ
     ==================================== -->
<header>
  <div class="header-inner">
    <a class="logo" href="index.html">🥦 食材管理</a>
    <nav>
      <a href="index.html">ホーム</a>
      <a href="db.html">食材DB</a>
      <a href="history.html" class="active">履歴</a>
    </nav>
  </div>
</header>

<!-- ====================================
     フィルターバー（固定）
     ==================================== -->
<div class="page-filter-bar">
  <div class="page-filter-inner">
    <p class="page-title">📋 登録履歴</p>

    <!-- 行1：キーワード検索 + お気に入り絞込 -->
    <div class="filter-row">
      <input
        type="text"
        class="filter-input"
        id="histSearch"
        placeholder="🔍 食材名・メモで検索…"
      >
      <button class="filter-chip" id="histFavFilter">⭐ お気に入り</button>
      <button class="bulk-delete-btn" id="bulkDeleteBtn">🗑️ 絞込を削除</button>
    </div>

    <!-- 行2：日付範囲 -->
    <div class="date-filter-row">
      <label>登録日：</label>
      <input type="date" class="date-filter-input" id="dateFrom" placeholder="開始日">
      <span style="color:var(--text-3); font-size:0.85rem;">〜</span>
      <input type="date" class="date-filter-input" id="dateTo"   placeholder="終了日">
      <button
        style="font-size:0.75rem; color:var(--text-3); background:none; border:none; text-decoration:underline; cursor:pointer;"
        id="clearDateBtn"
      >クリア</button>
    </div>
  </div>
</div>

<!-- ====================================
     メイン：履歴リスト
     ==================================== -->
<div class="list-wrap">
  <p class="list-count" id="histCount">読み込み中…</p>
  <div id="histList">
    <div class="loading-wrap"><div class="spinner"></div>読み込み中…</div>
  </div>
  <!-- ページネーション -->
  <div class="pagination" id="pagination" style="display:none;">
    <button class="page-btn" id="prevPage">◀ 前へ</button>
    <span id="pageInfo">1 / 1</span>
    <button class="page-btn" id="nextPage">次へ ▶</button>
  </div>
</div>

<!-- ====================================
     確認モーダル
     ==================================== -->
<div class="modal-overlay center" id="confirmOverlay">
  <div class="modal confirm-modal">
    <p class="confirm-head" id="confirmTitle">削除しますか？</p>
    <p class="confirm-sub"  id="confirmSub"></p>
    <div class="confirm-detail" id="confirmDetail"></div>
    <div class="confirm-btns">
      <button class="btn-cancel"  id="confirmCancel">キャンセル</button>
      <button class="btn-confirm" id="confirmOk" style="background:var(--expired-t);">削除する</button>
    </div>
  </div>
</div>

<!-- トースト通知 -->
<div class="toast" id="toast"></div>

<!-- ====================================
     Firebase & スクリプト
     ==================================== -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>

<script>
/* ============================================================
   history.html — 履歴ページ ロジック（全面書き直し版）
   ============================================================ */

var allHistory      = [];
var filteredHistory = [];
var searchQuery = '';
var filterFav   = false;
var dateFrom    = '';
var dateTo      = '';
var currentPage = 1;
var PAGE_SIZE   = 20;


/* ====================================
   Promise ベースの確認ダイアログ
   ==================================== */
var _confirmResolve = null;

function confirmDialog(opts) {
  return new Promise(function(resolve) {
    _confirmResolve = resolve;
    document.getElementById('confirmTitle').textContent = opts.title  || '';
    document.getElementById('confirmSub').textContent   = opts.sub    || '';
    document.getElementById('confirmDetail').innerHTML  = opts.detail || '';
    document.getElementById('confirmOk').textContent    = opts.okLabel || '削除する';
    document.getElementById('confirmOverlay').classList.add('show');
  });
}
function _closeConfirm(result) {
  document.getElementById('confirmOverlay').classList.remove('show');
  if (_confirmResolve) { var fn = _confirmResolve; _confirmResolve = null; fn(result); }
}
document.getElementById('confirmOk').addEventListener('click', function() { _closeConfirm(true); });
document.getElementById('confirmCancel').addEventListener('click', function() { _closeConfirm(false); });
document.getElementById('confirmOverlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('confirmOverlay')) _closeConfirm(false);
});


/* ====================================
   履歴リアルタイム監視（orderBy なし → JS でソート）
   ==================================== */
applyFiltersAndRender(); // 即座に空表示

db.collection('history').onSnapshot(
  function(snap) {
    allHistory = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
    // 登録日の新しい順
    allHistory.sort(function(a, b) {
      var ta = a.registeredAt instanceof Date ? a.registeredAt.getTime()
             : (a.registeredAt?.seconds || 0) * 1000;
      var tb = b.registeredAt instanceof Date ? b.registeredAt.getTime()
             : (b.registeredAt?.seconds || 0) * 1000;
      return tb - ta;
    });
    applyFiltersAndRender();
  },
  function(err) { console.warn('history エラー:', err.code, err.message); showHistWarning(err.message); }
);


/* ====================================
   フィルター入力イベント
   ==================================== */
document.getElementById('histSearch').addEventListener('input', function(e) {
  searchQuery = e.target.value.trim().toLowerCase();
  currentPage = 1;
  applyFiltersAndRender();
});
document.getElementById('histFavFilter').addEventListener('click', function() {
  filterFav = !filterFav;
  this.classList.toggle('active', filterFav);
  currentPage = 1;
  applyFiltersAndRender();
});
document.getElementById('dateFrom').addEventListener('change', function(e) {
  dateFrom = e.target.value; currentPage = 1; applyFiltersAndRender();
});
document.getElementById('dateTo').addEventListener('change', function(e) {
  dateTo = e.target.value; currentPage = 1; applyFiltersAndRender();
});
document.getElementById('clearDateBtn').addEventListener('click', function() {
  dateFrom = dateTo = '';
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value   = '';
  currentPage = 1;
  applyFiltersAndRender();
});


/* ====================================
   フィルター適用
   ==================================== */
function applyFiltersAndRender() {
  var list = allHistory.slice();

  if (searchQuery) {
    var q = searchQuery;
    var exact   = list.filter(function(h) { return h.foodName?.toLowerCase() === q || h.memo?.toLowerCase() === q; });
    var prefix  = list.filter(function(h) {
      return !exact.includes(h) && (h.foodName?.toLowerCase().startsWith(q) || h.memo?.toLowerCase().startsWith(q));
    });
    var partial = list.filter(function(h) {
      return !exact.includes(h) && !prefix.includes(h) &&
             (h.foodName?.toLowerCase().includes(q) || h.memo?.toLowerCase().includes(q));
    });
    list = exact.concat(prefix).concat(partial);
  }
  if (filterFav) list = list.filter(function(h) { return h.favorite; });
  if (dateFrom) {
    var from = new Date(dateFrom);
    list = list.filter(function(h) {
      if (!h.registeredAt) return false;
      var d = h.registeredAt instanceof Date ? h.registeredAt : new Date((h.registeredAt.seconds || 0) * 1000);
      return d >= from;
    });
  }
  if (dateTo) {
    var to = new Date(dateTo); to.setHours(23, 59, 59, 999);
    list = list.filter(function(h) {
      if (!h.registeredAt) return false;
      var d = h.registeredAt instanceof Date ? h.registeredAt : new Date((h.registeredAt.seconds || 0) * 1000);
      return d <= to;
    });
  }

  filteredHistory = list;
  renderHistory();
}


/* ====================================
   履歴レンダリング
   ==================================== */
function renderHistory() {
  var total    = filteredHistory.length;
  var totalPgs = Math.max(1, Math.ceil(total / PAGE_SIZE));
  currentPage  = Math.min(currentPage, totalPgs);

  document.getElementById('histCount').textContent = total + ' 件';

  var start     = (currentPage - 1) * PAGE_SIZE;
  var paginated = filteredHistory.slice(start, start + PAGE_SIZE);
  var container = document.getElementById('histList');

  if (total === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div>条件に一致する履歴はありません</div>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  container.innerHTML = '';
  paginated.forEach(function(item) { container.appendChild(renderHistItem(item)); });

  var pEl = document.getElementById('pagination');
  if (totalPgs > 1) {
    pEl.style.display = 'flex';
    document.getElementById('pageInfo').textContent = currentPage + ' / ' + totalPgs;
    document.getElementById('prevPage').disabled = currentPage === 1;
    document.getElementById('nextPage').disabled = currentPage === totalPgs;
  } else {
    pEl.style.display = 'none';
  }
}

document.getElementById('prevPage').addEventListener('click', function() {
  if (currentPage > 1) { currentPage--; renderHistory(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
});
document.getElementById('nextPage').addEventListener('click', function() {
  if (currentPage < Math.ceil(filteredHistory.length / PAGE_SIZE)) {
    currentPage++; renderHistory(); window.scrollTo({ top: 0, behavior: 'smooth' });
  }
});


/* ====================================
   履歴アイテム DOM 生成
   ==================================== */
function renderHistItem(item) {
  var wrap = document.createElement('div');
  var status  = item.expiryDate ? getExpiryStatus(item.expiryDate) : 'ok';
  var regDate = formatDateTime(item.registeredAt);

  var hl = function(str) {
    if (!searchQuery || !str) return escapeHtml(str || '');
    var pattern = escapeHtml(searchQuery).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escapeHtml(str).replace(new RegExp('(' + pattern + ')', 'gi'), '<span class="highlight">$1</span>');
  };

  wrap.innerHTML =
    '<div class="hist-item">' +
      '<div class="hist-left">' +
        '<div class="hist-name">' +
          (item.favorite ? '<span>⭐</span>' : '') +
          '<span>' + hl(item.foodName) + '</span>' +
          (item.expiryDate ? '<span class="hist-expiry-chip ' + status + '">' + formatDate(item.expiryDate) + '</span>' : '') +
        '</div>' +
        (item.memo ? '<div class="hist-memo">💬 ' + hl(item.memo) + '</div>' : '') +
        '<div class="hist-meta"><span>📅 登録：' + regDate + '</span></div>' +
      '</div>' +
      '<div class="hist-right">' +
        '<button class="icon-btn del" title="削除">🗑️</button>' +
      '</div>' +
    '</div>';

  wrap.querySelector('.icon-btn.del').addEventListener('click', async function() {
    var ok = await confirmDialog({
      title:   '履歴を削除しますか？',
      sub:     'この操作は取り消せません',
      detail:  '<p><span class="dl">食材名</span>' + escapeHtml(item.foodName || '') + '</p>' +
               '<p><span class="dl">期限</span>' + formatDate(item.expiryDate) + '</p>' +
               (item.memo ? '<p><span class="dl">メモ</span>' + escapeHtml(item.memo) + '</p>' : '') +
               '<p><span class="dl">登録日時</span>' + regDate + '</p>',
      okLabel: '削除する'
    });
    if (!ok) return;
    try {
      await db.collection('history').doc(item.id).delete();
      showToast('🗑️ 履歴を削除しました');
    } catch (e) {
      showToast('❌ 削除失敗（' + (e.code || e.message) + '）');
    }
  });

  return wrap;
}


/* ====================================
   一括削除
   ==================================== */
document.getElementById('bulkDeleteBtn').addEventListener('click', async function() {
  if (filteredHistory.length === 0) { showToast('⚠️ 削除する履歴がありません'); return; }

  var isFiltered = searchQuery || filterFav || dateFrom || dateTo;
  var label = (isFiltered ? '現在の絞り込み条件に一致する ' : '全履歴 ') + filteredHistory.length + ' 件';

  var ok = await confirmDialog({
    title:   label + 'を削除しますか？',
    sub:     'この操作は取り消せません',
    detail:  '<p style="color:var(--expired-t);font-weight:700;">' + label + 'を一括削除します</p>',
    okLabel: '一括削除する'
  });
  if (!ok) return;

  try {
    var ids = filteredHistory.map(function(h) { return h.id; });
    for (var i = 0; i < ids.length; i += 400) {
      var batch = db.batch();
      ids.slice(i, i + 400).forEach(function(id) {
        batch.delete(db.collection('history').doc(id));
      });
      await batch.commit();
    }
    showToast('🗑️ ' + ids.length + ' 件の履歴を削除しました');
  } catch (e) {
    showToast('❌ 削除失敗（' + (e.code || e.message) + '）');
  }
});


/* ====================================
   Firebase 警告バナー
   ==================================== */
var _warnShown = false;
function showHistWarning(msg) {
  if (_warnShown) return; _warnShown = true;
  var el = document.createElement('div');
  el.style.cssText = 'background:var(--today-bg);border:2px solid var(--today-b);color:var(--today-t);border-radius:var(--r);padding:11px 14px;margin-bottom:10px;font-size:0.82rem;';
  el.innerHTML = '⚠️ <strong>Firebase エラー</strong>：' + escapeHtml(msg || '') + '　<code>firebase-config.js</code> を確認してください。';
  var wrap = document.querySelector('.list-wrap');
  wrap.insertBefore(el, document.getElementById('histCount'));
}

</script>
</body>
</html>
