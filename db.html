<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>食材DB 🥦</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css?v=9">
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7BA05B">
<link rel="icon" type="image/png" href="assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <style>
    .sort-tabs { display:flex; gap:5px; margin-top:9px; flex-wrap:wrap; }
    .sort-tab {
      padding:5px 12px; border:2px solid var(--border); border-radius:var(--r-full);
      background:var(--surface); font-family:var(--font-body); font-size:0.76rem;
      font-weight:700; color:var(--text-2); transition:all 0.18s; white-space:nowrap;
    }
    .sort-tab:hover { border-color:var(--primary); color:var(--primary-d); }
    .sort-tab.active { background:var(--primary); border-color:var(--primary); color:white; }
    .edit-row { display:flex; flex-direction:column; gap:6px; flex:1; min-width:0; }
    .edit-row-top { display:flex; align-items:center; gap:6px; }
    .edit-input-name {
      flex:1; padding:6px 10px; border:2px solid var(--primary);
      border-radius:var(--r-sm); font-family:var(--font-body); font-size:0.9rem;
      outline:none; background:var(--bg);
    }
    .stock-badge {
      font-size:0.7rem; font-weight:700; padding:2px 8px;
      border-radius:var(--r-full); white-space:nowrap; flex-shrink:0;
    }
    .stock-badge.in-stock  { background:var(--soon-bg);    color:var(--soon-t); }
    .stock-badge.no-stock  { background:var(--surface-2);  color:var(--text-3); }
    .stock-badge.expired   { background:var(--expired-bg); color:var(--expired-t); }
    .stock-badge.today-exp { background:var(--today-bg);   color:var(--today-t); }
    .exclude-on { opacity: 1; border-color: var(--danger);}
    .exclude-off {  opacity: 0.35;}
  </style>
</head>
<body class="db-page">

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">🥦 食材管理</a>
    <nav>
      <a href="index.html">ホーム</a>
      <a href="mealplan.html">献立計画</a>
      <a href="db.html" class="active">食材DB</a>
      <a href="shopping.html">買い物</a>
      <a href="history.html">履歴</a>
    </nav>
  </div>
</header>

<div class="page-filter-bar">
  <div class="page-filter-inner">
    <button class="filter-toggle-btn" id="dbFilterToggle">
      🔍 検索・絞り込み
      <span id="dbFilterArrow">▼</span>
    </button>

    <div class="filter-panel" id="dbFilterPanel">
      <p class="page-title">📚 食材データベース</p>
      <div class="filter-row">
        <input type="text" class="filter-input" id="dbSearch" placeholder="🔍 食材名で検索…">
        <button class="filter-chip" id="dbFavFilter">⭐ お気に入り</button>
        <button class="filter-chip" id="dbStockFilter">📦 在庫あり</button>
      </div>
      <div class="sort-tabs">
        <button class="sort-tab active" data-sort="name">名前順</button>
        <button class="sort-tab" data-sort="fav">お気に入り優先</button>
        <button class="sort-tab" data-sort="expiry">期限順</button>
        <button class="sort-tab" data-sort="created">登録順</button>
      </div>
    </div>
  </div>
</div>

<div class="list-wrap">
  <p class="list-count" id="dbCount">読み込み中…</p>
  <div id="dbList">
    <div class="loading-wrap"><div class="spinner"></div>読み込み中…</div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fabBtn" title="新規食材を追加" style="bottom:20px;">＋</button>

<!-- 新規食材モーダル（期限なし・食材DBのみ） -->
<div class="modal-overlay" id="newFoodOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span>🌿 新規食材を追加</span>
      <button class="modal-close" id="newFoodClose">✕</button>
    </div>
    <div class="food-name-row">
      <input type="text" class="food-name-input" id="newFoodName" placeholder="食材名を入力…">
      <button class="fav-toggle-btn" id="newFoodFavBtn">☆</button>
    </div>
    <p id="dupMsg" style="font-size:0.78rem;color:var(--accent);margin-bottom:8px;display:none;">
      ⚠️ 同名の食材が既に存在します
    </p>
    <button class="register-btn" id="newFoodRegisterBtn">追加する</button>
  </div>
</div>

<!-- 確認モーダル -->
<div class="modal-overlay center" id="confirmOverlay">
  <div class="modal confirm-modal">
    <p class="confirm-head" id="confirmTitle"></p>
    <p class="confirm-sub"  id="confirmSub"></p>
    <div class="confirm-detail" id="confirmDetail"></div>
    <div class="confirm-btns">
      <button class="btn-cancel"  id="confirmCancel">キャンセル</button>
      <button class="btn-confirm" id="confirmOk">実行する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script src="js/db.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
